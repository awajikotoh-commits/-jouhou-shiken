<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高等学校（情報）教員資格認定試験 予想問題集</title>
<style>
:root {
  --primary: #1a3a5c;
  --secondary: #2471a3;
  --accent: #f39c12;
  --correct: #1e8449;
  --wrong: #c0392b;
  --bg: #eaf0fb;
  --card: #ffffff;
  --text: #1c2833;
  --muted: #7f8c8d;
  --border: #cdd3da;
  --radius: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic Pro', 'メイリオ', Meiryo, 'ＭＳ ゴシック', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.7;
}
#app { max-width: 820px; margin: 0 auto; padding: 16px; }

/* ヘッダー */
.header {
  background: var(--primary);
  color: white;
  text-align: center;
  padding: 20px 16px 14px;
  border-radius: var(--radius) var(--radius) 0 0;
  margin-bottom: 0;
}
.header h1 { font-size: 1.15rem; font-weight: bold; letter-spacing: 0.05em; }
.header p { font-size: 0.8rem; opacity: 0.8; margin-top: 4px; }

/* カード */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  overflow: hidden;
  margin-bottom: 16px;
}
.card-body { padding: 24px; }

/* ホーム画面 */
.home-title {
  text-align: center;
  padding: 24px 24px 8px;
  font-size: 1.1rem;
  font-weight: bold;
  color: var(--primary);
}
.home-desc {
  text-align: center;
  color: var(--muted);
  font-size: 0.85rem;
  padding: 0 24px 20px;
}
.btn {
  display: block;
  width: calc(100% - 48px);
  margin: 0 24px 12px;
  padding: 14px 20px;
  border: none;
  border-radius: var(--radius);
  font-size: 1rem;
  font-family: inherit;
  cursor: pointer;
  text-align: center;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:hover { opacity: 0.88; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--primary); color: white; font-weight: bold; }
.btn-secondary { background: var(--secondary); color: white; }
.btn-outline { background: white; color: var(--primary); border: 2px solid var(--primary); }
.btn-success { background: var(--correct); color: white; font-weight: bold; }
.btn-sm {
  display: inline-block; width: auto; margin: 0;
  padding: 8px 18px; font-size: 0.9rem;
}
.btn-last {
  background: linear-gradient(135deg, #e67e22, #d35400);
  color: white; font-weight: bold;
}

/* 進捗バー */
.progress-wrap { padding: 12px 24px 0; }
.progress-label {
  display: flex; justify-content: space-between;
  font-size: 0.8rem; color: var(--muted); margin-bottom: 6px;
}
.progress-bar-bg {
  background: #dce6f5; border-radius: 99px; height: 8px; overflow: hidden;
}
.progress-bar-fg {
  background: linear-gradient(90deg, var(--secondary), var(--accent));
  height: 100%; border-radius: 99px;
  transition: width 0.4s ease;
}

/* 問題番号・カテゴリ */
.q-meta {
  display: flex; align-items: center; gap: 8px;
  padding: 16px 24px 0;
  flex-wrap: wrap;
}
.q-num {
  background: var(--primary); color: white;
  padding: 3px 12px; border-radius: 99px;
  font-size: 0.85rem; font-weight: bold;
}
.q-cat {
  background: #eaf0fb; color: var(--secondary);
  padding: 3px 12px; border-radius: 99px;
  font-size: 0.78rem; border: 1px solid #c5d8f0;
}

/* 問題文 */
.q-text {
  padding: 14px 24px 10px;
  font-size: 0.97rem;
  font-weight: bold;
  line-height: 1.8;
}
.q-code {
  background: #f4f6f8;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
  margin: 8px 24px;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 0.88rem;
  white-space: pre;
  overflow-x: auto;
  line-height: 1.6;
}

/* 選択肢 */
.choices { padding: 8px 24px 20px; }
.choice-btn {
  display: flex; align-items: flex-start; gap: 12px;
  width: 100%;
  background: #f8faff;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.93rem;
  text-align: left;
  line-height: 1.6;
  transition: border-color 0.15s, background 0.15s;
}
.choice-btn:hover:not(.disabled) { border-color: var(--secondary); background: #eaf4fd; }
.choice-label {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; min-width: 28px;
  background: var(--secondary); color: white;
  border-radius: 50%; font-weight: bold; font-size: 0.85rem;
}
.choice-btn.correct { border-color: var(--correct); background: #eafaf1; }
.choice-btn.correct .choice-label { background: var(--correct); }
.choice-btn.wrong { border-color: var(--wrong); background: #fdedec; }
.choice-btn.wrong .choice-label { background: var(--wrong); }
.choice-btn.show-correct { border-color: var(--correct); background: #eafaf1; }
.choice-btn.show-correct .choice-label { background: var(--correct); }
.choice-btn.disabled { cursor: default; }
.choice-btn.ch-selected { border-color: var(--secondary); background: #ddeeff; }
.choice-btn.ch-selected .choice-label { background: #1a5276; }
.choice-btn.eliminated { opacity: 0.28; }
.choice-btn.eliminated .choice-label { background: var(--muted); }
.submit-btn-wrap { padding: 4px 24px 16px; display: flex; gap: 10px; align-items: center; }
.btn-answer { background: var(--secondary); color: white; font-weight: bold; font-size: 1rem; padding: 13px 32px; border: none; border-radius: var(--radius); cursor: pointer; }
.btn-answer:disabled { background: var(--border); color: var(--muted); cursor: default; }

/* 論述問題 */
.essay-hint { margin: 0 24px 12px; padding: 14px 16px; background: #f8f9fa; border: 1px dashed var(--border); border-radius: var(--radius); font-size: 0.88rem; color: var(--muted); line-height: 1.8; }
.essay-model { margin: 0 24px 16px; padding: 14px 16px; background: #f0f9ff; border-left: 4px solid var(--secondary); border-radius: 0 var(--radius) var(--radius) 0; font-size: 0.9rem; line-height: 1.9; }
.essay-model strong { color: var(--primary); display: block; margin-bottom: 6px; }
.essay-assess { padding: 4px 24px 20px; display: flex; gap: 10px; flex-wrap: wrap; }
.btn-assess-ok { background: var(--correct); color: white; font-weight: bold; padding: 12px 28px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 0.95rem; font-family: inherit; }
.btn-assess-ng { background: var(--wrong); color: white; font-weight: bold; padding: 12px 28px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 0.95rem; font-family: inherit; }
.btn-reveal { display: block; margin: 0 24px 16px; padding: 13px; background: var(--accent); color: white; font-weight: bold; border: none; border-radius: var(--radius); cursor: pointer; font-size: 0.95rem; font-family: inherit; width: calc(100% - 48px); }
.choice-text-wrap { flex: 1; }
.choice-exp {
  margin-top: 6px;
  font-size: 0.82rem;
  line-height: 1.6;
  padding: 5px 9px;
  border-radius: 4px;
}
.choice-exp-o { background: #e8f8f0; color: #1a6535; border-left: 3px solid #27ae60; }
.choice-exp-x { background: #fdf2f2; color: #8e2018; border-left: 3px solid #e74c3c; }

/* 解説 */
.explanation {
  margin: 4px 24px 16px;
  padding: 14px 16px;
  background: #f0f9ff;
  border-left: 4px solid var(--secondary);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 0.88rem;
  line-height: 1.8;
}
.explanation strong { color: var(--primary); }

.answered-label {
  text-align: center; padding: 8px 24px;
  font-size: 0.88rem;
}
.label-correct { color: var(--correct); font-weight: bold; }
.label-wrong { color: var(--wrong); font-weight: bold; }

.nav-area {
  display: flex; justify-content: flex-end;
  padding: 0 24px 20px; gap: 10px;
}

/* 結果画面 */
.result-header {
  text-align: center;
  padding: 28px 24px 16px;
}
.result-score {
  font-size: 3.5rem;
  font-weight: bold;
  color: var(--primary);
  line-height: 1;
}
.result-score span { font-size: 1.4rem; }
.result-rank {
  display: inline-block;
  margin: 12px auto;
  padding: 6px 24px;
  border-radius: 99px;
  font-weight: bold;
  font-size: 1rem;
}
.rank-s { background: #f9e79f; color: #784212; }
.rank-a { background: #d5f5e3; color: #1e8449; }
.rank-b { background: #d6eaf8; color: #1a5276; }
.rank-c { background: #fdebd0; color: #784212; }
.rank-d { background: #fadbd8; color: #922b21; }

.result-table {
  width: 100%; border-collapse: collapse;
  font-size: 0.88rem; margin-bottom: 8px;
}
.result-table th {
  background: #eaf0fb; padding: 8px 12px;
  text-align: left; border-bottom: 2px solid var(--border);
}
.result-table td {
  padding: 8px 12px; border-bottom: 1px solid var(--border);
}
.cell-correct { color: var(--correct); font-weight: bold; }
.cell-wrong { color: var(--wrong); font-weight: bold; }

/* セーブ情報バナー */
.save-banner {
  background: linear-gradient(135deg, #fef9e7, #fef3cd);
  border: 2px solid #f39c12;
  border-radius: var(--radius);
  padding: 16px 20px;
  margin: 0 24px 16px;
  display: flex; align-items: center; gap: 12px;
  flex-wrap: wrap;
}
.save-banner-icon { font-size: 1.6rem; }
.save-banner-text { flex: 1; font-size: 0.9rem; }
.save-banner-text strong { color: var(--primary); }

/* カテゴリ選択 */
.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  padding: 0 24px 20px;
}
.cat-btn {
  background: #f8faff;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.88rem;
  text-align: left;
  transition: border-color 0.15s, background 0.15s;
}
.cat-btn:hover { border-color: var(--secondary); background: #eaf4fd; }
.cat-btn .cat-name { font-weight: bold; color: var(--primary); }
.cat-btn .cat-count { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
.cat-btn .cat-acc { font-size: 0.75rem; margin-top: 4px; font-weight: bold; }
.cat-btn.acc-low { background: #fff5f5; border-color: #e74c3c; }
.cat-btn.acc-low .cat-name { color: #c0392b; }
.cat-btn.acc-low:hover { background: #ffe8e8; }
.cat-btn.acc-mid { background: #fffbf0; border-color: #f39c12; }
.cat-btn.acc-mid .cat-name { color: #b7770d; }
.cat-btn.acc-mid:hover { background: #fff3d0; }

.divider { height: 1px; background: var(--border); margin: 4px 24px 16px; }

/* レスポンシブ */
@media (max-width: 560px) {
  .header h1 { font-size: 1rem; }
  .q-text { font-size: 0.92rem; }
  .choice-btn { font-size: 0.88rem; }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// =============================================
// 問題バンク (令和6・7年度傾向対応)
// =============================================
const QUESTIONS = [

// ---- 西洋教育史 ----
{id:101, cat:"西洋教育史",
 q:"コメニウスに関する記述として正しいものはどれか。",
 ch:["「人間の教育」を著し、幼稚園を創設して遊びによる幼児教育を体系化した","「汎知学（パンソフィア）」を提唱し、すべての人にすべてのことを教える教育を目指した『大教授学』を著した","「白紙説（タブラ・ラサ）」を唱え、人間の心は生まれた時は何も書かれていない石板のようなものだとした","シカゴ大学に実験学校を設立し、「なすことによって学ぶ」問題解決学習を実践した"],
 ans:1,
 exp:"コメニウス（1592-1670）は「近代教育学の父」。「汎知学（パンソフィア）」＝すべての人にすべてのことを教える理念を『大教授学（Didactica Magna）』で体系化。ア=フレーベル、ウ=ロック、エ=デューイの特徴。",
 choiceExps:["誤り。「人間の教育」を著し幼稚園を創設・遊びを重視したのはフレーベル。コメニウスは『大教授学』を著した。","正しい。コメニウスの「汎知学（パンソフィア）」＝すべての人へのすべての知識普及。「近代教育学の父」。","誤り。「白紙説（タブラ・ラサ）」はジョン・ロック（イギリス経験論哲学者）の主張。コメニウスとは別人。","誤り。シカゴ実験学校・「なすことによって学ぶ」はデューイ（19〜20世紀）の特徴。コメニウスは17世紀の人物。"]},

{id:102, cat:"西洋教育史",
 q:"ルソーの教育思想に関する記述として誤っているものはどれか。",
 ch:["子どもは大人の縮小版ではなく独自の発達段階にある存在であることを主張した","著書「エミール」において、理想の教育のあり方を物語形式で示した","大人が積極的に知識・道徳を与える「積極教育」を主張し、教師主導の指導を重視した","「自然に帰れ」を基本思想とし、文明による人間の堕落を批判した"],
 ans:2,
 exp:"ルソーが主張したのは「消極教育（否定教育）」で、大人の干渉を最小限にして子どもの自然な発達を尊重するもの。「積極教育」と説明するのは誤り。「子どもの発見者」とも呼ばれる。",
 choiceExps:["正しい記述。ルソーは子ども期の価値を主張し「子どもの発見者」と呼ばれる。誤りを選ぶ問題なので不正解。","正しい記述。「エミール」はエミールという少年の教育を描いた教育書。誤りを選ぶ問題なので不正解。","これが誤り（正解）。ルソーの主張は「消極教育」。大人の干渉を排し子どもの自然な発達を尊重する立場。「積極教育」は誤り。","正しい記述。「自然に帰れ」はルソーの代表的な思想。誤りを選ぶ問題なので不正解。"]},

{id:103, cat:"西洋教育史",
 q:"ヘルバルトの教育論に関する記述として正しいものはどれか。",
 ch:["教育の目的を「身体的健康の増進」に置き、体育を中心とした教育課程を提唱した","「準備・提示・比較・総括・応用」の5段階教授法を自ら体系化した","教育の目的を「道徳的品性の陶冶」に置き、教授の4段階として「明瞭・連合・系統・方法」を示した","「なすことによって学ぶ」を提唱し、生活経験に根ざした問題解決学習を重視した"],
 ans:2,
 exp:"ヘルバルト（1776-1841）は「一般教育学」を著し、教授の4段階（明瞭→連合→系統→方法）を示した。5段階教授法（予備・提示・比較・概括・応用）は弟子たちが発展させたもの。選択肢エはデューイの特徴。",
 choiceExps:["誤り。ヘルバルトの教育目的は「道徳的品性の陶冶」。体育中心の教育は提唱していない。","誤り。5段階教授法（予備・提示・比較・概括・応用）はヘルバルトの弟子（チラー・ライン等）が発展させたもの。ヘルバルト自身は4段階を示した。","正しい。「一般教育学」著者。道徳的品性の陶冶を目的とし、明瞭→連合→系統→方法の4段階を提唱した。","誤り。「なすことによって学ぶ」はデューイのプラグマティズム教育思想。ヘルバルトとは別人・別立場。"]},

{id:104, cat:"西洋教育史",
 q:"フレーベルの教育実践・思想に関する記述として正しいものはどれか。",
 ch:["「白紙説（タブラ・ラサ）」を提唱し、環境と経験が人間形成のすべてを決定すると主張した","「恩物（Gabe）」と呼ばれる球・立方体・円筒などの教育玩具を考案し、幼児の自発的活動を促した","「経験と教育」を著し、民主主義社会における教育の役割を論じた","子どもへの大人の干渉を最小限にする「消極教育」を幼児教育に適用することを主張した"],
 ans:1,
 exp:"フレーベル（1782-1852）は幼稚園（Kindergarten）を創設し、「恩物（Gabe）」と呼ばれる教育玩具を考案。遊びを通じた幼児の自己活動・創造性の発達を重視した。ア=ロック、ウ=デューイ、エ=ルソーの特徴。",
 choiceExps:["誤り。「白紙説（タブラ・ラサ）」はジョン・ロックの主張。フレーベルは遊びと自己活動を重視した教育実践者。","正しい。フレーベルが考案した「恩物（Gabe）」は球・円柱・立方体など。幼稚園（Kindergarten）創設者としても知られる。","誤り。「経験と教育」「民主主義と教育」はデューイの著作。フレーベルは「人間の教育」を著した。","誤り。「消極教育」（大人の干渉を排する立場）はルソーの主張。フレーベルは積極的な教育環境の提供を重視した。"]},

{id:105, cat:"西洋教育史",
 q:"次のア～エの記述のうち、デューイの教育思想として正しいものの組合せはどれか。\nア　教育の目的を「道徳的品性の陶冶」に置き、教授の系統性と段階的な知識伝達を重視した。\nイ　「なすことによって学ぶ（learning by doing）」を提唱し、経験を通じた学習を重視した。\nウ　シカゴ大学に実験学校（Laboratory School）を設立し、生活経験に根ざした教育を実践した。\nエ　子どもへの大人の干渉を排する「消極教育」を主張し、自然な発達を最優先した。",
 ch:["ア・イ","ア・エ","イ・ウ","ウ・エ"],
 ans:2,
 exp:"デューイ（1859-1952）はプラグマティズム哲学者。イ（learning by doing）・ウ（シカゴ実験学校）が正しい。ア=ヘルバルトの特徴（道徳的品性の陶冶・系統的教授）。エ=ルソーの「消極教育」。",
 choiceExps:["誤り。ア（道徳的品性の陶冶・系統的教授）はヘルバルトの特徴。デューイは経験・問題解決を重視した立場。","誤り。ア（ヘルバルトの特徴）・エ（ルソーの消極教育）はいずれもデューイではない。","正しい。イ（learning by doing）・ウ（シカゴ実験学校創設）はともにデューイの特徴として正しい。","誤り。エ（消極教育）はルソーの主張。デューイは積極的な学習環境の設計と問題解決を重視した。"]},

// ---- 日本教育史 ----
{id:201, cat:"日本教育史",
 q:"明治5年（1872年）に公布され、日本初の近代的な学校制度の基本法となった法令はどれか。",
 ch:["教育勅語","学制","小学校令","教育基本法"],
 ans:1,
 exp:"「学制」は明治5年8月に太政官布告として公布された。「邑に不学の戸なく、家に不学の人なからしめん」という方針を掲げ、全国に学校を設置しようとした。",
 choiceExps:["教育勅語は明治23年（1890年）発布。忠君愛国の道徳的勅語であり学制の基本法令ではない。","明治5年（1872年）公布。日本初の近代的学校制度の基本法令。正しい。","小学校令は明治19年（1886年）、森有礼文相時代に公布された別の法令。","教育基本法は昭和22年（1947年）制定の戦後の基本法。明治期の法令ではない。"]},

{id:202, cat:"日本教育史",
 q:"教育勅語（教育ニ関スル勅語）に関する記述として正しいものはどれか。",
 ch:["明治5年（1872年）に公布され、「邑に不学の戸なく」という方針のもと近代学校制度の普及を図った","孝悌・忠君・愛国など12の徳目を示し、昭和23年に衆参両院の決議によって排除・失効が確認された","内容はキリスト教的博愛の精神を基本とし、国際的な平和協調と人権尊重を理念として掲げた","発布当時から批判が多く、全国の学校での奉読は義務付けられなかった"],
 ans:1,
 exp:"教育勅語は明治23年（1890年）10月30日発布。孝悌・忠君・愛国など12の徳目。昭和23年（1948年）に衆議院・参議院の決議で排除・失効確認。ア=「学制」の説明。",
 choiceExps:["誤り。「邑に不学の戸なく」という方針・近代学校制度の基礎は「学制」（明治5年）の説明。教育勅語は明治23年発布の道徳的勅語。","正しい。孝悌・忠君・愛国など12の徳目を示し、昭和23年（1948年）の衆参両院決議で排除・失効が確認された。","誤り。教育勅語の基本は儒教道徳・忠君愛国。キリスト教的博愛・国際平和・人権尊重は基本理念ではない。","誤り。全国の学校で奉読（式典での朗読）・礼拝が義務付けられ、御真影（天皇・皇后の写真）とともに奉安殿に安置された。"]},

{id:203, cat:"日本教育史",
 q:"昭和22年（1947年）に制定された教育基本法に関する記述として適切なものはどれか。",
 ch:["日本国憲法（昭和22年5月3日施行）に先立って同年3月31日に制定されたが、占領期GHQの指令に基づくものであり、憲法の精神とは独立した立法経緯をもつ","昭和22年の制定時は男女共学や私立学校に関する規定は含まれず、後の改正で追加された","「人格の完成」と「平和で民主的な国家及び社会の形成者」の育成を教育の目的とした","義務教育の年数を6年と規定し、戦前の尋常小学校に準じた就学期間を継承した"],
 ans:2,
 exp:"昭和22年3月31日制定。第1条で「人格の完成」「平和で民主的な国家及び社会の形成者」「心身ともに健康な国民の育成」を目的とした。義務教育は9年（第4条）。男女共学（第5条）も明記。",
 choiceExps:["誤り。教育基本法（3月31日制定）は憲法施行（5月3日）より前だが、憲法の精神に則り制定された。「先立つ」より「同時整備」という理解が正確。","誤り。旧教育基本法第5条に「男女共学」の原則が明記されていた。","正しい。第1条の目的規定。「人格の完成」「平和で民主的な国家及び社会の形成者」「心身ともに健康な国民」がキーワード。","誤り。義務教育は9年（中学校卒業まで）と規定（第4条）。6年ではない。"]},

{id:204, cat:"日本教育史",
 q:"平成18年（2006年）に改正された教育基本法に関する記述として最も適切なものはどれか。",
 ch:["教育の目的に「公共の精神」「豊かな情操と道徳心」が加えられた","義務教育の年数が9年から12年に延長され、高等学校段階も義務化された","宗教的情操の教育が公立学校においても積極的に推進されることとなった","改正は条文整理のみで実質的な内容変更はなく旧法と同一の理念が継承された"],
 ans:0,
 exp:"平成18年改正で「公共の精神」「豊かな情操と道徳心」「伝統と文化の尊重」「郷土愛・愛国心」等が教育の目標（第2条）に加えられ、家庭教育・幼児期教育等の条文が新設された。",
 choiceExps:["正しい。第2条の目標に「公共の精神」「豊かな情操と道徳心」「伝統と文化の尊重」等が新規追加。","誤り。義務教育の年数は旧法から変更なく9年のまま（現行法第5条）。高等学校の義務化も行われていない。","誤り。改正後も公立学校における宗教的中立性は維持されており、宗教的情操教育が義務付けられたわけではない。","誤り。平成18年改正では家庭教育・幼児期教育・生涯学習・教員等の新条文が多数追加され、旧法（11か条）から大幅に拡充された（18か条）。"]},

{id:205, cat:"日本教育史",
 q:"昭和22年（1947年）、教育基本法と同年に制定され、6・3・3・4制の新学制の基本となった法律はどれか。",
 ch:["学校教育法","社会教育法","教育職員免許法","地方教育行政の組織及び運営に関する法律"],
 ans:0,
 exp:"学校教育法は昭和22年3月31日に制定。幼稚園・小学校・中学校・高等学校・大学などの学校の目的・設置基準・教育課程を定め、6・3・3・4制の学校体系を確立した。",
 choiceExps:["正しい。昭和22年3月31日制定。6・3・3・4制の学校体系を確立した基本法。","誤り。社会教育法は昭和24年制定。図書館・公民館等の社会教育施設・活動を規定。","誤り。教育職員免許法は昭和24年制定。教員免許の種類・取得要件等を規定。","誤り。地方教育行政の組織及び運営に関する法律（地教行法）は昭和31年制定。"]},

{id:301, cat:"教育基本法",
 q:"教育基本法第1条（教育の目的）の条文として正しいものはどれか。",
 ch:["教育は、人格の完成を目指し、平和で民主的な国家及び社会の形成者として必要な資質を備えた心身ともに健康な国民の育成を期して行われなければならない。","教育は、真理と正義を愛し、個人の価値をたっとび、勤労と責任を重んじ、自主的精神に充ちた心身ともに健康な国民の育成を期して行われなければならない。","教育は、豊かな創造性を備え持続可能な社会の担い手となる国民の育成を期して行われなければならない。","教育は、学術文化の中心として、広く知識を授けるとともに深く専門の学芸を教授研究することを目的とする。"],
 ans:0,
 exp:"現行教育基本法（平成18年）第1条の条文。「人格の完成」「平和で民主的な国家及び社会の形成者」「心身ともに健康な国民」がキーワード。",
 choiceExps:["正しい。現行教育基本法（平成18年）第1条の条文そのまま。","誤り。旧教育基本法（昭和22年）第1条の文章。「真理と正義を愛し」は旧法の表現。","誤り。「豊かな創造性」「持続可能な社会の担い手」は第1条に存在しない文言。","誤り。これは学校教育法第83条（大学の目的）に近い表現。教育基本法第1条ではない。"]},

{id:302, cat:"教育基本法",
 q:"教育基本法第2条（教育の目標）の第1号として規定されている内容はどれか。",
 ch:["幅広い知識と教養を身に付け、真理を求める態度を養い、豊かな情操と道徳心を培うとともに、健やかな身体を養うこと。","自主及び自律の精神を養うとともに、職業及び生活との関連を重視し、勤労を重んずる態度を養うこと。","生命を尊び、自然を大切にし、環境の保全に寄与する態度を養うこと。","伝統と文化を尊重し、それらをはぐくんできた我が国と郷土を愛するとともに、他国を尊重し、国際社会の平和と発展に寄与する態度を養うこと。"],
 ans:0,
 exp:"第2条第1号は「幅広い知識と教養」「真理を求める態度」「豊かな情操と道徳心」「健やかな身体」が列挙された目標。5号まであり、愛国心・国際理解は第5号。",
 choiceExps:["正しい。第2条第1号。「幅広い知識と教養」「真理を求める態度」「豊かな情操と道徳心」「健やかな身体」が正確な内容。","誤り。これは第2条第2号の内容。「自主及び自律の精神」「職業及び生活との関連」「勤労を重んずる態度」。","誤り。これは第2条第4号の内容。「生命を尊び」「自然を大切に」「環境の保全に寄与する態度」。","誤り。これは第2条第5号の内容。「伝統と文化を尊重」「我が国と郷土を愛する」「他国を尊重」「国際社会の平和と発展に寄与」。"]},

{id:303, cat:"教育基本法",
 q:"教育基本法第4条（教育の機会均等）に関する記述として適切でないものはどれか。",
 ch:["すべて国民は、ひとしく、その能力に応じた教育を受ける機会を与えられなければならず、人種・信条・性別・社会的身分等によって差別されない","国及び地方公共団体は、経済的理由によって修学が困難な者に対して、奨学の措置を講じなければならない","障害のある者が、障害の状態に応じ十分な教育を受けられるよう、教育上必要な支援を講じなければならない","国及び地方公共団体による奨学の措置は、経済的理由による修学困難への支援であり、義務教育段階の者に限り適用される"],
 ans:3,
 exp:"教育基本法第4条第3項の奨学の措置は義務教育段階に限定されていない。すべての段階の修学困難者への支援が義務付けられている。",
 choiceExps:["正しい規定（第4条第1項）。能力に応じた教育機会と、人種・信条・性別・社会的身分等による差別の禁止。「適切でないもの」ではない。","正しい規定（第4条第3項）。経済的困難者への奨学措置の義務。「適切でないもの」ではない。","正しい規定（第4条第2項）。障害のある者への教育上の支援。「適切でないもの」ではない。","これが誤りの記述（正答）。奨学の措置は義務教育段階に限定されていない。第4条第3項に「義務教育段階に限り」という制限は存在しない。"]},

{id:304, cat:"教育基本法",
 q:"教育基本法第9条（教員）において、教員に関して規定されている内容として最も適切なものはどれか。",
 ch:["法律に定める学校の教員は、全体の奉仕者として公共の利益のために勤務し、その職務の遂行に当たっては、全力を挙げてこれに専念しなければならない","法律に定める学校の教員は、自己の崇高な使命を深く自覚し、絶えず研究と修養に励み、その職責の遂行に努めなければならない","法律に定める学校の教員は、その任用に当たって政治的中立性を保つため、いかなる政治的活動も行ってはならず、教育の中立を損なう行為を厳に慎まなければならない","法律に定める学校の教員は、教育の専門的職務の特性にかんがみ、その身分が尊重され、待遇の適正が期せられるとともに、養成と研修の充実が図られなければならない"],
 ans:1,
 exp:"第9条第1項「崇高な使命を深く自覚し、絶えず研究と修養に励み、職責の遂行に努める」が正確な条文。第9条第2項は教員の養成・研修の充実（エに似た内容）を規定。アは地方公務員法第30条（服務の根本基準）に近い表現。",
 choiceExps:["誤り。「全体の奉仕者として公共の利益のために勤務し全力を挙げて専念」は地方公務員法第30条（服務の根本基準）の表現。教育基本法第9条の条文ではない。","正しい。第9条第1項の条文。「崇高な使命」「研究と修養に励む」「職責の遂行」が正確なキーワード。","誤り。第9条には「政治的活動の禁止」の規定はない。政治的行為の制限は地方公務員法第36条・教育公務員特例法等に規定される別の事項。","誤り。「身分の尊重・待遇の適正・養成と研修の充実」は第9条第2項の国の義務規定に近い内容。ただし語尾「図られなければならない」等は第2項のもので第1項の設問には当たらない。"]},

{id:401, cat:"学校教育法",
 q:"学校教育法第50条に規定する高等学校の目的として正しいものはどれか。",
 ch:["高等学校は、中学校における教育の基礎の上に、心身の発達及び進路に応じて、高度な普通教育及び専門教育を施すことを目的とする。","高等学校は、義務教育として行われる普通教育を基礎として、高度な職業教育を施すことを目的とする。","高等学校は、深く専門の学芸を教授研究し、知的・道徳的及び応用的能力を展開させることを目的とする。","高等学校は、心身の発達に応じた基礎的な普通教育を施すとともに、勤労の精神を養うことを目的とする。"],
 ans:0,
 exp:"学校教育法第50条の条文そのまま。「中学校の基礎の上に」「心身の発達及び進路に応じて」「高度な普通教育及び専門教育」がキーワード。",
 choiceExps:["正しい。学校教育法第50条の条文。「中学校における教育の基礎の上に」「心身の発達及び進路に応じて」「高度な普通教育及び専門教育」が正確。","誤り。「義務教育として行われる普通教育を基礎として」は中学校（第45条）の目的に近い文章。高校は義務教育ではない。","誤り。「深く専門の学芸を教授研究し」は大学（第83条）の目的。高等学校の目的ではない。","誤り。「基礎的な普通教育」「勤労の精神を養う」は高等学校の目的とは異なる表現。"]},

{id:402, cat:"学校教育法",
 q:"学校教育法における「学校」に含まれないものはどれか。",
 ch:["専修学校","幼稚園","各種学校","学習塾"],
 ans:3,
 exp:"学校教育法第1条に列挙される「一条校」（幼稚園・小学校・中学校・義務教育学校・高等学校・中等教育学校・特別支援学校・大学・高等専門学校）と、専修学校・各種学校が学校教育法上の「学校」。学習塾は含まれない。",
 choiceExps:["誤り。専修学校は学校教育法第124条以降に規定される「学校教育法上の学校」に含まれる。","誤り。幼稚園は学校教育法第1条に列挙される一条校の一つ。当然「学校」に含まれる。","誤り。各種学校は学校教育法第134条以降に規定される学校教育法上の学校の一種。","正しい。学習塾は学校教育法上の「学校」に含まれない。認可不要で設置できる民間教育機関。"]},

{id:403, cat:"学校教育法",
 q:"学校教育法に規定する特別支援学校に関する記述として適切なものはどれか。",
 ch:["特別支援学校は、障害種別ごとに設置されることが原則であり、異なる障害種の児童生徒を同一校に在籍させることは法律上認められていない","特別支援学校は、都道府県が設置義務を負い、地域の通常学校との連携による支援活動は行政機関が別途実施することとされている","特別支援学校は、小学部・中学部・高等部を置くことができ、必要に応じて幼稚部も置くことができる","特別支援学校の幼稚部・小学部・中学部・高等部はすべて必置であり、一つでも欠く場合は設置認可の対象外となる"],
 ans:2,
 exp:"特別支援学校（旧盲・聾・養護学校）は、視覚・聴覚・知的・肢体・病弱の5障害を対象。小・中・高等部（必置）と幼稚部（任意）を設置でき、地域の学校への「センター的機能」も担う。複数障害種を対象とした学校設置も可能。",
 choiceExps:["誤り。法律上、複数の障害種を対象とする特別支援学校の設置は認められている。都道府県の判断により、複数障害種の児童生徒が同一校に在籍できる。","誤り。学校教育法第74条により、特別支援学校は在籍する児童生徒への教育とともに、地域の学校に対する「センター的機能」（支援・助言）を担うことが規定されている。","正しい。小・中・高等部は必置、幼稚部は任意設置。設置者（国立・公立・私立）を問わず設置できる。","誤り。幼稚部の設置は任意であり、必置ではない。小学部・中学部・高等部が必置の規定であり、幼稚部がなくても設置認可の要件を満たす。"]},

// ---- 地方公務員法 ----
{id:501, cat:"地方公務員法",
 q:"地方公務員法第30条に規定する「服務の根本基準」として正しいものはどれか。",
 ch:["すべて職員は、全体の奉仕者として公共の利益のために勤務し、且つ、職務の遂行に当っては、全力を挙げてこれに専念しなければならない。","職員は、その職務を遂行するに当り、法令、条例、地方公共団体の規則及び地方公共団体の機関の定める規程に従い、且つ、上司の職務上の命令に忠実に従わなければならない。","職員は、職務上知り得た秘密を漏らしてはならない。その職を退いた後も、また、同様とする。","職員は、その職の信用を傷つけ、又は職員の職全体の不名誉となるような行為をしてはならない。"],
 ans:0,
 exp:"第30条は服務の根本基準。「全体の奉仕者」「公共の利益のために勤務」「全力を挙げて専念」がキーワード。第32条が法令等及び上司の職務上の命令に従う義務、第34条が守秘義務、第33条が信用失墜行為の禁止。",
 choiceExps:["正しい。第30条（服務の根本基準）の条文。「全体の奉仕者」「公共の利益」「全力を挙げて専念」が正確なキーワード。","誤り。これは第32条（法令等及び上司の職務上の命令に従う義務）の内容。第30条ではない。","誤り。これは第34条（守秘義務）の内容。「職務上知り得た秘密」「退職後も同様」は第34条。","誤り。これは第33条（信用失墜行為の禁止）の内容。職の信用を傷つける行為の禁止は第33条。"]},

{id:502, cat:"地方公務員法",
 q:"地方公務員法第33条が規定する内容として正しいものはどれか。",
 ch:["職員は、全体の奉仕者として公共の利益のために勤務しなければならない","職員は、その職の信用を傷つけ、又は職員の職全体の不名誉となるような行為をしてはならない","職員は、職務上知り得た秘密を漏らしてはならない","職員は、政党その他の政治的団体の結成に関与してはならない"],
 ans:1,
 exp:"第33条は「信用失墜行為の禁止」。職に就いている間だけでなく、私生活における行為も含まれる。職員としての体面を傷つける行為全般が禁止される。",
 choiceExps:["誤り。これは第30条（服務の根本基準）の内容。「全体の奉仕者として公共の利益のために勤務」は第30条。","正しい。第33条（信用失墜行為の禁止）の内容。在職中だけでなく私生活の行為も対象となる。","誤り。これは第34条（守秘義務）の内容。「職務上知り得た秘密を漏らしてはならない」は第34条。","誤り。これは第36条（政治的行為の制限）の内容。政党等の結成への関与禁止は第36条。"]},

{id:503, cat:"地方公務員法",
 q:"地方公務員法第34条（守秘義務）に関する記述として正しいものはどれか。",
 ch:["守秘義務は在職中のみ課せられ、任期満了や辞職による退職後は適用が免除される","守秘義務は退職後も引き続き課せられ、職を退いた後においても秘密を漏らすことは禁じられる","守秘義務に違反した場合は行政上の懲戒処分の対象となるが、刑事罰の適用はない","上司の職務命令がある場合は守秘義務より命令が優先され、命令に従って秘密を開示することができる"],
 ans:1,
 exp:"守秘義務（第34条）は退職後も継続する。違反した場合は1年以下の懲役又は50万円以下の罰金が科される（第60条）刑事罰の規定もある。",
 choiceExps:["誤り。第34条は「その職を退いた後も、また、同様とする」と明記されており、退職後も守秘義務は継続する。","正しい。第34条の規定。退職後も守秘義務が継続することが明記されており、離職後の秘密漏洩も禁じられる。","誤り。守秘義務違反は懲戒処分だけでなく、第60条により1年以下の懲役または50万円以下の罰金の刑事罰も規定されている。","誤り。上司の命令があっても守秘義務が免除されるわけではない。正当な理由（法令・議会証言等）がなければ義務は継続。"]},

{id:504, cat:"地方公務員法",
 q:"地方公務員法における職員の政治的行為の制限に関する記述として適切なものはどれか。",
 ch:["地方公務員の政治的行為の制限は、国家公務員と全く同一の範囲が適用される","地方公務員は、当該地方公共団体の区域内において、条例で定める政治的行為が禁止される","地方公務員は、いかなる政治的活動も全面的に禁止されている","地方公務員は、投票や選挙活動も含めてすべての政治参加が禁止される"],
 ans:1,
 exp:"国家公務員は人事院規則で広く政治的行為が制限されるが、地方公務員は条例で定める範囲での制限（第36条）。投票権などの基本的権利は保障されている。",
 choiceExps:["誤り。国家公務員は人事院規則で広範に制限されるが、地方公務員は条例で定める範囲（第36条）で異なる制限となる。","正しい。地方公務員の政治的行為制限は第36条で条例に委ねられており、勤務する地域内での制限が基本。","誤り。政治的活動が「全面的に禁止」されているわけではない。投票・請願等の基本権は保障されている。","誤り。投票権は保障された基本的権利。「すべての政治参加が禁止」は誤り。"]},

// ---- 高等学校学習指導要領 総則 ----
{id:601, cat:"高校学習指導要領（総則）",
 q:"高等学校学習指導要領（平成30年告示）の総則において示されている「育成を目指す資質・能力の三つの柱」の組み合わせとして正しいものはどれか。",
 ch:["知識・理解、思考力・判断力・表現力、学習意欲・態度","知識及び技能、思考力・判断力・表現力等、学びに向かう力・人間性等","基礎的・基本的な知識・技能、課題解決能力、生きる力","確かな学力、豊かな心、健やかな体"],
 ans:1,
 exp:"平成29-30年改訂学習指導要領の三本柱。①知識及び技能（何を知っているか）②思考力・判断力・表現力等（思考して判断・表現できるか）③学びに向かう力・人間性等（どのように学ぶか）。",
 choiceExps:["誤り。旧来の表現に近い。「知識・理解」「学習意欲・態度」は平成29年改訂前の観点であり、三本柱の正確な表現ではない。","正しい。①知識及び技能 ②思考力・判断力・表現力等 ③学びに向かう力・人間性等 が正確な三本柱。","誤り。「基礎的・基本的な知識・技能」「課題解決能力」「生きる力」は以前の表現。「生きる力」は理念だが三本柱ではない。","誤り。「確かな学力」「豊かな心」「健やかな体」は「生きる力」の三要素であり、資質・能力の三本柱とは別の概念。"]},

{id:602, cat:"高校学習指導要領（総則）",
 q:"高等学校学習指導要領（平成30年告示）総則において示されている「主体的・対話的で深い学び」について、「深い学び」の説明として最も適切なものはどれか。",
 ch:["教科書の内容を丁寧に体系化し、基礎から応用へと段階的に積み上げることで、知識・技能を確実に深く習得・定着させる学び","各教科等の特質に応じた「見方・考え方」を働かせながら、知識を相互に関連付けてより深く理解したり、情報を精査して考えを形成したり、問題を見いだして解決策を考えたりする学び","単元全体を通じた教師との丁寧な対話によって、生徒が段階的に知識を受け取り、その積み重ねにより概念的な理解を深めていく学び","単元の振り返り活動を充実させ、本時の学習内容を確認するとともに、次回授業への動機付けとなる問いを生徒自身が形成する学び"],
 ans:1,
 exp:"「深い学び」とは各教科等の「見方・考え方」を働かせて思考する学び。単なる知識の深化でも暗記でもなく、学習した知識・概念を活用して思考・判断・表現する過程が重要。",
 choiceExps:["誤り。知識・技能の習得・定着は重要だが、それは「深い学び」ではなく基礎的な学習活動。「深い学び」は見方・考え方を働かせた思考を通じて概念的な理解に至る過程を指す。","正しい。各教科等の「見方・考え方」を働かせ、知識を関連付けて深く理解し、問題を見いだして解決策を考える学び。","誤り。教師との対話を通じた段階的な知識の習得は「対話的な学び」の側面に近い。「深い学び」は見方・考え方を働かせた主体的な思考過程を指し、知識伝達とは異なる。","誤り。振り返り活動は「主体的な学び」の要素に近い。「深い学び」は見方・考え方を働かせた思考・判断・表現の過程であり、振り返りの充実そのものとは区別される。"]},

{id:603, cat:"高校学習指導要領（総則）",
 q:"カリキュラム・マネジメントとして学習指導要領に示されていない事項はどれか。",
 ch:["教科等横断的な視点で教育内容を組み立てること","教育課程の実施状況を評価し改善を図ること（PDCAサイクル）","教育課程の実施に必要な人的・物的体制を確保すること","校長が毎年度、教育課程を文部科学大臣に届け出て承認を受けること"],
 ans:3,
 exp:"カリキュラム・マネジメントは①教科横断的な内容編成②PDCAサイクルによる改善③人的・物的体制整備の3側面。文科大臣への届出・承認は規定されていない。",
 choiceExps:["正しい規定。教科等横断的な視点での内容編成はカリキュラム・マネジメントの第1側面。「示されていない事項」ではない。","正しい規定。教育課程の実施状況を評価・改善するPDCAサイクルは第2側面。「示されていない事項」ではない。","正しい規定。教育課程実施に必要な人的・物的体制確保は第3側面。「示されていない事項」ではない。","これが答え（示されていない事項）。文科大臣への届出・承認制度はカリキュラム・マネジメントに規定されていない。"]},

{id:604, cat:"高校学習指導要領（総則）",
 q:"高等学校学習指導要領（平成30年告示）において示された「総合的な探究の時間」の目標に関する記述として正しいものはどれか。",
 ch:["探究の見方・考え方を働かせ、横断的・総合的な学習を行うことを通して、課題を発見し解決していく資質・能力を育成するとともに、自己の将来の進路を見通す力を高めることを目指す","探究の見方・考え方を働かせ、横断的・総合的な学習を行うことを通して、自己の在り方生き方を考えながら、よりよく課題を発見し解決していくための資質・能力を育成することを目指す","各教科等の見方・考え方を総合的に働かせながら、実社会・実生活の諸問題を教科横断的に探究することを通して、知識・技能を活用して課題を解決する実践的な資質・能力を育成することを目指す","地域や社会のリアルな課題を対象に、協働的な探究活動を通して解決策を提案・発信することで、社会参画の意識と地域貢献への具体的な行動力となる資質・能力を育成することを目指す"],
 ans:1,
 exp:"「総合的な探究の時間」（高校版）の目標。「自己の在り方生き方を考えながら」が中学「総合的な学習の時間」との相違点。アは「進路を見通す」が目標の文言ではなく、ウ・エは各教科横断や地域貢献に矮小化した誤り。",
 choiceExps:["誤り。「自己の将来の進路を見通す力を高める」は目標の文言ではない。高校「総探」は進路指導ではなく「自己の在り方生き方を考えながら課題発見・解決する」ことが目標。","正しい。学習指導要領（平成30年告示）の「総合的な探究の時間」の目標の正確な表現。「自己の在り方生き方を考えながら」が高校版の特徴的な文言。","誤り。各教科の知識・技能活用を強調した説明は教科学習に近い。「総合的な探究の時間」の特質は教科を横断した探究と「自己の在り方生き方」への問いかけにある。","誤り。地域貢献への行動力という記述は学習活動の一例に過ぎない。目標の定義としては「よりよく課題を発見し解決していくための資質・能力の育成」と「自己の在り方生き方を考える」が核心。"]},

{id:605, cat:"高校学習指導要領（総則）",
 q:"高等学校学習指導要領（平成30年告示）における「個に応じた指導」の充実として示されている内容として最も適切なものはどれか。",
 ch:["すべての生徒に同じ教材・指導計画で授業を行い、評価のみ個別化する","生徒の特性や習熟度に応じた学習活動を充実させること及びICTの活用等を通じて、指導の個別化と学習の個性化を推進する","特別な支援が必要な生徒のみに個別のカリキュラムを作成する","教師が直接指導する時間を確保するため、ICTの使用は最小限にとどめる"],
 ans:1,
 exp:"「指導の個別化」（学習の定着に課題のある生徒への重点的支援）と「学習の個性化」（興味・関心に応じた学習の深め方）の両面を、ICT活用も含め充実させることが求められている。",
 choiceExps:["誤り。「同じ教材・指導計画で評価のみ個別化」は個に応じた指導の趣旨に反する。指導過程自体を個別化することが求められている。","正しい。指導の個別化（定着支援）と学習の個性化（興味・関心に応じた深化）をICT活用も含め推進することが示されている。","誤り。「特別な支援が必要な生徒のみ」ではなく、すべての生徒に応じた指導の充実が求められている。","誤り。ICTの活用を最小限にするのではなく、ICT等も積極的に活用して個に応じた指導を充実させることが求められている。"]},

{id:606, cat:"高校学習指導要領（総則）",
 q:"高等学校学習指導要領（平成30年告示）総則において、学校における道徳教育に関する規定として適切なものはどれか。",
 ch:["高等学校では中学校「道徳科」に準じて「道徳の時間」を設け、週1単位時間を確保して各教科との関連を図りながら道徳的価値の自覚を促す教育を計画的・発展的に行うものとする","高等学校における道徳教育は、人間としての在り方生き方に関する教育を学校の教育活動全体を通じて行うものとする","高等学校における道徳教育は、ホームルーム活動と特別活動を中心的な場として実施し、各教科での道徳的内容の取扱いは各教科担当教員の裁量に任されている","高等学校の道徳教育は公民科（特に「倫理」）を要とし、他教科は公民科の内容と関連させながら補完的に取り組む。教育課程上は公民科の単位として扱われる"],
 ans:1,
 exp:"高等学校には「道徳科」はなく、「人間としての在り方生き方に関する教育」を教育活動全体で行う。総則が規定する中心的役割を担うのは公民科と特別活動。各教科等すべてで関連付けて展開する。",
 choiceExps:["誤り。高等学校に「道徳の時間」は設けられていない。中学校の「道徳科」に相当する教科・時間は高校では存在せず、教育活動全体で道徳教育を行う。","正しい。高等学校学習指導要領総則の規定。「人間としての在り方生き方に関する教育」を全教育活動を通じて行う。公民科と特別活動が中心的役割を担う。","誤り。高校の道徳教育は特別活動だけでなく、各教科・総合的な探究の時間を含む学校教育活動全体で行う。各教科担任の裁量ではなく、学校全体として組織的に取り組む。","誤り。公民科が中心的役割を担うことは示されているが「公民科のみ」「他教科は補完」ではなく、また道徳教育は公民科の単位として算入されるものではない。"]},

{id:607, cat:"高校学習指導要領（総則）",
 q:"高等学校の標準単位数に関する記述として適切なものはどれか。",
 ch:["卒業に必要な単位数は、全日制高校では80単位以上と規定されている","情報科の必履修科目「情報Ⅰ」の標準単位数は3単位である","1単位時間は45分を標準とする","全日制課程の場合、各学年の授業週数は35週以上を標準とする"],
 ans:3,
 exp:"全日制課程の標準授業週数は35週（総則第1款の3）。情報Ⅰの標準単位数は2単位（3単位ではない）。卒業必要単位数は74単位以上（80単位ではない）。1単位時間は50分標準（45分は中学・小学校）。",
 choiceExps:["誤り。卒業必要単位数は74単位以上。80単位以上ではない。","誤り。情報Ⅰの標準単位数は2単位。3単位ではない。","誤り。全日制課程の1単位時間は50分が標準。45分は中学校・小学校の標準時間。","正しい。全日制課程の標準授業週数は35週（高校学習指導要領総則第1款の3）。"]},

{id:608, cat:"高校学習指導要領（総則）",
 q:"高等学校学習指導要領（平成30年告示）の総則における「言語能力の育成」に関する記述として適切なものはどれか。",
 ch:["言語能力は国語科・外国語科のみが育成責任を担い、他教科での言語活動は各校の裁量に委ねられている","言語能力の育成は「学習の基盤となる資質・能力」として位置付けられ、各教科等の特質に応じた言語活動の充実が求められる","言語能力は学習の基盤として最重要とされており、他の資質・能力に優先して年間計画に位置付けなければならない","言語活動の充実のため、全教科で年間を通じてレポート・プレゼンテーションを必修の学習活動として課すことが定められている"],
 ans:1,
 exp:"総則では「言語能力」「情報活用能力」「問題発見・解決能力」を学習の基盤となる資質・能力として位置付け、各教科等の特質に応じた言語活動の充実を求めている。国語科・外国語科だけの問題ではなく全教科で取り組む。",
 choiceExps:["誤り。言語能力の育成は国語科・外国語科だけでなく、全教科等の特質に応じた言語活動の充実が総則で求められている。他教科が裁量に委ねられるという規定はない。","正しい。言語能力は「学習の基盤となる資質・能力」として総則に位置付けられ、各教科等の特質に応じた言語活動の充実が全校的に求められている。","誤り。言語能力が「最重要」として他の資質・能力に「優先」するという規定はない。情報活用能力・問題発見解決能力と並列に示されている。","誤り。レポート・プレゼンテーションの必修化という規定はない。言語活動の充実は各教科の特質に応じた形で行うものであり、一律の形式を義務付けていない。"]},

{id:609, cat:"高校学習指導要領（総則）",
 q:"高等学校学習指導要領（平成30年告示）に示されている「情報活用能力」の位置付けとして正しいものはどれか。",
 ch:["情報活用能力は情報科のみで育成すべき専門的能力である","情報活用能力は「学習の基盤となる資質・能力」として位置付けられており、学校全体でコンピュータや情報通信ネットワークの活用を図ることが示されている","情報活用能力の育成は大学入試で問われないため、総則上の優先度は低い","情報活用能力とは、主にSNSやインターネットを適切に利用する道徳的判断力を指す"],
 ans:1,
 exp:"総則では言語能力・情報活用能力・問題発見解決能力を「学習の基盤となる資質・能力」に位置付け、情報活用能力については各学校でICT環境整備・コンピュータ等の活用を積極的に図ることを求めている。",
 choiceExps:["誤り。情報活用能力は情報科だけでなく、学校全体で全教科にわたって育成することが求められている。","正しい。学習の基盤となる資質・能力として位置付けられ、学校全体でコンピュータや情報通信ネットワークを活用することが示されている。","誤り。大学入試での扱いにかかわらず、総則において学習の基盤として重要な位置付けが与えられている。","誤り。情報活用能力とは情報モラルにとどまらず、情報を収集・整理・分析・表現する能力や、プログラミング的思考等も含む幅広い概念。"]},

{id:610, cat:"高校学習指導要領（総則）",
 q:"高等学校学習指導要領（平成30年告示）総則において示されている「学校設定教科・科目」に関する記述として正しいものはどれか。",
 ch:["学校設定科目は必履修科目として設定しなければならない","各学校は地域や学校の実態に応じて、学校設定教科・科目を設けることができる","学校設定教科・科目の単位数は3単位以上でなければならない","学校設定教科・科目は都道府県教育委員会の承認を必要とし、文科大臣への届け出義務がある"],
 ans:1,
 exp:"総則では学校の実態に応じた学校設定教科・科目の設置を認めている。単位数や必修・選択の区別は学校が定める。承認・届出制度は規定されていない。学校の主体的なカリキュラム編成の一環。",
 choiceExps:["誤り。学校設定科目は必履修として設定しなければならないとは規定されていない。選択科目として設けることもできる。","正しい。各学校は地域や学校の特色に応じて、独自の学校設定教科・科目を設けることが認められている。","誤り。学校設定科目の単位数に3単位以上という下限規定はない。学校が実態に応じて適切に定める。","誤り。学校設定教科・科目の設置に都道府県教委の承認や文科大臣への届出は原則として必要とされていない。"]},

{id:611, cat:"高校学習指導要領（総則）",
 q:"高等学校における必履修教科・科目の説明として適切なものはどれか。",
 ch:["必履修教科・科目はすべての生徒が履修しなければならない教科・科目であり、情報Ⅰはその一つである","必履修教科・科目は生徒の選択に委ねられており、選択しなかった場合は代替科目で対応できる","普通科では必履修教科・科目が卒業に必要な全単位数を占めるため、選択科目は設けられていない","必履修教科・科目の履修が認定されるためには学期末試験で60点以上を取ることが学習指導要領で定められている"],
 ans:0,
 exp:"必履修教科・科目はすべての生徒が履修しなければならない教科・科目。情報Ⅰ（2単位）は令和4年度入学生から必履修化。他に国語総合、数学Ⅰ、英語コミュニケーションⅠなど。",
 choiceExps:["正しい。必履修教科・科目はすべての生徒が履修しなければならない。情報Ⅰは令和4年度から必履修科目となった。","誤り。必履修教科・科目は選択ではなく、原則としてすべての生徒が履修しなければならない。代替には制限がある。","誤り。必履修科目を履修しても卒業要件の74単位には余裕があり、多くの選択科目を設けることができる。","誤り。成績の合否基準（60点以上等）は学習指導要領に規定されておらず、各学校の規定に委ねられている。"]},

{id:612, cat:"高校学習指導要領（総則）",
 q:"高等学校学習指導要領（平成30年告示）の総則において示された「主体的・対話的で深い学び」のうち「主体的な学び」の説明として最も適切なものはどれか。",
 ch:["学習内容に興味・関心をもち、授業前に自ら教科書や参考資料を調べて予習し、疑問点を整理しながら授業に臨むことで、知識の定着と発言力を高めていく学び","学ぶことに興味や関心をもち、自己のキャリア形成の方向性と関連付けながら、見通しをもって粘り強く取り組み、自己の学習活動を振り返って次に生かす学び","学ぶ仲間と対話・協働しながら課題に向き合い、多様な視点や意見を取り入れて互いの考えを深め合いながら、より良い解に共に迫っていく協働的な学び","デジタル機器やインターネットを活用しながら情報を収集・整理・分析し、自らが設定した問いに対する答えを自律的に探究していく学び"],
 ans:1,
 exp:"「主体的な学び」は単なる予習・調べ学習ではなく、「見通し→粘り強い取組→振り返り→次への活用」という学習サイクルの中で、キャリア形成との関連も意識しながら学ぶ姿勢を指す。",
 choiceExps:["誤り。予習は主体的な学びの一側面になりうるが、それだけでは不十分。見通しをもって粘り強く取り組み振り返りまで含む学習サイクル全体、かつキャリア形成との関連付けが主体的な学びの核心。","正しい。見通しをもって粘り強く取り組み、振り返って次に生かすという学習サイクルと、キャリア形成との関連付けが主体的な学びの核心。","誤り。学習仲間との対話・協働は「対話的な学び」の説明に近い。「主体的な学び」は他者との関係よりも自己の内発的動機づけ・自己調整・振り返りを指す。","誤り。ICTを活用した探究学習は手段の一つ。「主体的な学び」はツールや活動形態ではなく、見通し・粘り強さ・振り返りという学習への向き合い方そのものを指す。"]},

{id:613, cat:"高校学習指導要領（総則）",
 q:"高等学校学習指導要領（平成30年告示）における特別活動の目標として正しいものはどれか。",
 ch:["学業成績の向上を目的として、補充学習の機会を提供すること","集団や社会の形成者としての見方・考え方を働かせ、様々な集団活動に自主的・実践的に取り組み、互いのよさや可能性を発揮しながら、個人及び集団としてよりよい生活や人間関係を築くための資質・能力を育成すること","進路指導を効率的に行うため、ホームルーム活動を活用した進学・就職支援を充実させること","地域との連携・協働を深め、ボランティア活動を必修化すること"],
 ans:1,
 exp:"特別活動の目標は「集団や社会の形成者としての見方・考え方を働かせ、集団活動に自主的・実践的に取り組む」こと。ホームルーム活動・生徒会活動・学校行事の3内容で構成される。",
 choiceExps:["誤り。特別活動の目標は学業成績向上や補充学習ではなく、集団活動を通じた自主的・実践的な資質・能力の育成。","正しい。集団活動に自主的・実践的に取り組み、よりよい生活や人間関係を築く資質・能力を育成することが特別活動の目標。","誤り。進路指導支援は特別活動の一側面だが、「目標」の中心ではない。効率的な進学・就職支援は目標の表現として不適切。","誤り。ボランティア活動は特別活動に含まれることはあるが、必修化は規定されていない。"]},

{id:614, cat:"高校学習指導要領（総則）",
 q:"高等学校学習指導要領（平成30年告示）に示された「体験活動」の充実に関する記述として適切なものはどれか。",
 ch:["体験活動は課外活動・部活動のみで行うものであり、教育課程には含まれない","社会体験、自然体験、ボランティア活動などの体験活動は、学校教育において積極的に活用されることが求められており、言語活動と関連付けて実施することが有効とされる","体験活動は安全管理上のリスクがあるため、学習指導要領上は推奨されていない","体験活動はすべての高等学校で年間10時間以上実施することが義務付けられている"],
 ans:1,
 exp:"総則において体験活動（社会体験・自然体験・ボランティア活動・職場体験等）の積極的な活用が求められており、言語活動と組み合わせることで学びを深化させる効果が期待されている。",
 choiceExps:["誤り。体験活動は課外活動・部活動だけでなく、各教科・総合的な探究の時間・特別活動など教育課程内でも積極的に位置付けられる。","正しい。社会体験・自然体験・ボランティア活動等の積極的活用が求められており、言語活動との関連付けが有効とされる。","誤り。安全管理に配慮した上で体験活動を積極的に行うことが求められており、推奨されていないという記述は誤り。","誤り。年間10時間以上という具体的な時間数の義務付けは学習指導要領には規定されていない。"]},

{id:615, cat:"高校学習指導要領（総則）",
 q:"高等学校学習指導要領（平成30年告示）における「主権者教育」や「消費者教育」など現代的な諸課題に対応した教育の取り扱いとして適切なものはどれか。",
 ch:["これらは特定の教科を新設して対応するものとされており、総則には規定がない","主権者教育・消費者教育・防災教育・環境教育などの現代的な課題については、教科等横断的な視点から教育課程を編成し、各学校の特色を生かして取り組むことが求められる","これらの教育は「公民科」のみで扱うものであり、他教科での取り扱いは不要である","現代的な課題への対応は高校1年次に集中して実施し、2・3年次は教科学習に専念するものとする"],
 ans:1,
 exp:"主権者教育・消費者教育・防災教育・環境教育・人権教育等は現代的な課題として、特定教科だけでなく教科横断的な視点から各学校が工夫して取り組むことが総則・各教科で示されている。",
 choiceExps:["誤り。これらの教育は特定の新設教科だけで対応するものではなく、既存の各教科等を横断して取り組むことが示されている。","正しい。現代的な課題については教科等横断的な視点から教育課程を編成し、各学校の特色を生かして取り組むことが求められる。","誤り。公民科が中心的役割を担うことは多いが「公民科のみ」ではなく、家庭科・保健体育・理科等も関連して取り組む。","誤り。特定学年での集中実施を義務付ける規定はない。各学校の実態に応じて計画的・継続的に取り組むことが求められる。"]},

{id:701, cat:"生徒指導",
 q:"文部科学省「生徒指導提要」（令和4年改訂版）において示されている生徒指導の目的として最も適切なものはどれか。",
 ch:["生徒指導は、問題行動を示す生徒を早期に把握し、学校・家庭・関係機関が連携しながら個別の指導・支援を行うことで、規律の回復と学校生活への再適応を促す教育活動のことである","生徒指導は、児童生徒が社会の中で自分らしく生きることができる存在へと、自発的・主体的に成長や発達する過程を支える教育活動のことである","生徒指導は、いじめ・不登校・暴力行為などの問題行動を予防・対応するため学校全体で組織的に取り組む活動であり、すべての生徒の規範意識と道徳心の育成を中心目的とするものである","生徒指導は、学習指導を補完する役割を担い、授業外の生活場面における指導・相談・進路支援等を通じて生徒が学校生活に適応できるよう支援する教育活動のことである"],
 ans:1,
 exp:"令和4年改訂の生徒指導提要では、生徒指導の目的を「自発的・主体的な成長・発達の支援」と定義。問題対応のみでなく「発達支持的生徒指導」（全生徒対象）を基盤とする積極的な概念。授業場面も含む学校生活全体で展開される。",
 choiceExps:["誤り。問題行動対応と規律回復を中心に据えた説明だが、令和4年改訂提要は全生徒の自発的・主体的な成長支援を主目的とし、問題対応は一部に過ぎない。","正しい。令和4年改訂の生徒指導提要の定義。「社会の中で自分らしく生きることができる存在へと、自発的・主体的に成長や発達する過程を支える」が核心。","誤り。問題行動への対応は生徒指導の一機能だが、中心目的ではない。発達支持的生徒指導（第1層：全生徒対象）が基盤とされ、規範意識育成だけに矮小化はできない。","誤り。生徒指導は学習指導と「対置」や「補完」の関係ではなく、相互に関連する。授業外に限定されず、授業場面においても展開される教育活動。"]},

{id:702, cat:"生徒指導",
 q:"いじめ防止対策推進法（平成25年）に関する記述として適切でないものはどれか。",
 ch:["いじめとは、児童生徒に対して、当該児童生徒が在籍する学校に在籍している等当該児童生徒と一定の人的関係にある他の児童生徒が行う一定の行為で、心理的又は物質的な影響を与える行為とされている","学校は、いじめ防止等のための対策に関する基本的な方針を策定しなければならない","インターネット上のいじめはリアルの行為ではないため、同法のいじめには該当しない","重大事態が発生した場合、学校設置者は速やかに調査組織を設けて調査を行わなければならない"],
 ans:2,
 exp:"インターネット上の行為も「一定の行為」に含まれ、いじめとして対応が必要。法では「インターネットを通じて行われるいじめ」への対処についても規定している。",
 choiceExps:["正しい規定（第2条第1項のいじめの定義）。「一定の人的関係」「一定の行為」「心理的又は物質的な影響」が定義の要素。「適切でない」ではない。","正しい規定（第13条）。学校はいじめ防止等のための基本方針を策定しなければならない。「適切でない」ではない。","これが答え（適切でない記述）。インターネット上のいじめも同法の対象。第19条でネットいじめへの対処が規定されている。","正しい規定（第28条）。重大事態発生時の調査義務は法に明記されている。「適切でない」ではない。"]},

{id:703, cat:"生徒指導",
 q:"不登校の状態にある生徒への対応として、文部科学省のガイドラインで示されている内容として適切なものはどれか。",
 ch:["不登校はすべて学校への登校を最終目標として支援する","フリースクール等の民間施設や教育支援センターへの通所も、出席として認めることができる","不登校の原因は家庭環境にあるため、保護者への指導・支援を最優先とする","不登校の生徒には学習の機会を提供する必要はなく、まず心のケアを優先する"],
 ans:1,
 exp:"文科省「不登校児童生徒への支援の在り方について（通知）」では、フリースクールや教育支援センター（適応指導教室）への通所を出席として認めることができるとしている。支援の目標は「社会的自立」。",
 choiceExps:["誤り。文科省の方針では支援の目標は「社会的自立」であり、必ずしも学校への登校を最終目標としない（令和元年通知）。","正しい。文科省通知で示された対応。フリースクール・教育支援センターへの通所を出席として認めることができる。","誤り。不登校の背景は家庭環境だけでなく多様。また家庭への一方的な指導より子どもへの支援を優先することが原則。","誤り。学習の機会確保は不登校支援の重要な要素。「学習の機会を提供する必要はない」は誤り。"]},

{id:801, cat:"教育心理（人格と適応）",
 q:"クレッチマー（Kretschmer）の人格（気質）類型論として正しいものはどれか。",
 ch:["外向型・内向型の2類型","循環気質（躁鬱質）・分裂気質・粘着気質の3類型","神経症型・精神病型・正常型の3類型","開放性・誠実性・外向性・協調性・神経症傾向の5因子"],
 ans:1,
 exp:"クレッチマーは体型と気質の関係を研究し、肥満型（循環気質・躁鬱的）・細長型（分裂気質・内閉的）・闘士型（粘着気質・執着的）の3類型を提唱した。5因子はビッグファイブ（コスタとマクレー等）。",
 choiceExps:["誤り。外向型・内向型の2類型はユング（Jung）の類型論。クレッチマーは体型に基づく3類型。","正しい。クレッチマーの類型：肥満型→循環気質（躁鬱的）、細長型→分裂気質（内閉的）、闘士型→粘着気質（執着的）。","誤り。神経症型・精神病型・正常型の3分類は精神医学的診断分類に近い表現。クレッチマーの類型とは異なる。","誤り。5因子（開放性・誠実性・外向性・協調性・神経症傾向）はビッグファイブ理論（コスタ＆マクレー等）の特性論。"]},

{id:802, cat:"教育心理（人格と適応）",
 q:"フロイト（Freud）の防衛機制（適応機制）における「投影（投射）」の説明として正しいものはどれか。",
 ch:["自分の欲求や失敗に対して社会的に認められる理由を付けて正当化する","自分の内的な欲求・感情を否認し、他者がその感情を持っていると知覚する","不安を引き起こす事態から逃れるために幼い段階の行動様式に戻る","社会的に認められない衝動を、社会的に価値ある行動に転換する"],
 ans:1,
 exp:"投影（投射）：「私が彼を嫌いなのではなく、彼が私を嫌っているのだ」のように自己の欲求・感情を他者のものとして知覚すること。合理化=ア、退行=ウ、昇華=エ。",
 choiceExps:["誤り。これは「合理化（rationalization）」の説明。失敗や欲求不満に社会的に認められる理由を後付けする防衛機制。","正しい。「投影（投射）」の説明。自分の受け入れがたい感情・欲求を他者のものとして知覚することで不安を和らげる。","誤り。これは「退行（regression）」の説明。ストレス時に幼い段階の行動様式（指しゃぶり等）に戻る防衛機制。","誤り。これは「昇華（sublimation）」の説明。社会的に認められない衝動（攻撃性等）を芸術・スポーツ等に転換する防衛機制。"]},

{id:803, cat:"教育心理（発達の理論）",
 q:"ピアジェ（Piaget）の認知発達段階において、「保存の概念」（見た目が変わっても量・数・長さは変わらないという理解）が獲得されるのはどの段階か。",
 ch:["感覚運動期（0〜2歳）","前操作期（2〜7歳）","具体的操作期（7〜11歳）","形式的操作期（11歳以降）"],
 ans:2,
 exp:"保存の概念は具体的操作期に獲得。前操作期の幼児は見た目に左右され（中心化）、コップに移し替えると水の量が変わったと答える。形式的操作期になると抽象的・仮説的思考が可能になる。",
 choiceExps:["誤り。感覚運動期（0〜2歳）は感覚と運動による認知が中心。「対象の永続性」が獲得される段階。","誤り。前操作期（2〜7歳）は言語・シンボルを使い始めるが、自己中心性（中心化）があり保存概念はまだ獲得できない。","正しい。具体的操作期（7〜11歳）に保存の概念が獲得される。論理的思考が可能になるが具体的事物に限定される。","誤り。形式的操作期（11歳以降）は抽象的・仮説的・命題的思考が可能になる段階。保存概念はより早い時期に獲得される。"]},

{id:804, cat:"教育心理（発達の理論）",
 q:"ヴィゴツキー（Vygotsky）の「発達の最近接領域（ZPD: Zone of Proximal Development）」の説明として最も適切なものはどれか。",
 ch:["認知発達が急激に進む臨界期のことである","子どもが一人でできる水準と、大人・有能な仲間の援助を借りてできる水準との差の領域である","最適な学習が起こる脳の特定の領域のことである","道徳的発達において次の段階に進む直前の領域のことである"],
 ans:1,
 exp:"ZPDは「現在の発達水準（独力でできること）」と「潜在的発達水準（支援を受けてできること）」の差。この領域に働きかけること（足場がけ：scaffolding）が有効な教授であるとした。",
 choiceExps:["誤り。「臨界期（sensitive period）」は特定の能力習得に最適な時期。ZPDとは異なる概念。","正しい。ZPDの定義。独力でできる水準と援助を受けてできる水準の差の領域。この領域への働きかけ（足場がけ）が有効。","誤り。「脳の特定の領域」はZPDとは無関係。ZPDは発達レベルの差を指す心理学的概念。","誤り。「道徳的発達の次の段階に進む直前の領域」はコールバーグの道徳発達論に近い表現。ヴィゴツキーのZPDではない。"]},

{id:805, cat:"教育心理（学習の理論）",
 q:"スキナー（Skinner）のオペラント条件づけに基づくプログラム学習の原理として適切でないものはどれか。",
 ch:["スモールステップの原理：学習内容を小さなステップに分けて提示する","積極的反応の原理：学習者が能動的に反応・回答する","即時確認の原理：反応の正誤をすぐにフィードバックする","発見学習の原理：教師が教えず学習者が自力で概念を発見する"],
 ans:3,
 exp:"プログラム学習の原理は①スモールステップ②積極的反応③即時確認④自己ペース⑤学習者検証。「発見学習」はブルーナー（Bruner）の概念であり、スキナーのプログラム学習とは異なる。",
 choiceExps:["正しい原理（含まれる）。スモールステップの原理：内容を小さな段階に分けて提示し、確実な成功体験を積ませる。","正しい原理（含まれる）。積極的反応の原理：学習者が能動的に回答・反応することでオペラント条件づけを促す。","正しい原理（含まれる）。即時確認の原理：反応の正誤を即時フィードバックし、強化・消去を効果的に行う。","これが答え（含まれない原理）。「発見学習」はブルーナーの概念。スキナーのプログラム学習は教師が設計した手順に沿う指導型学習。"]},

{id:806, cat:"教育心理（学習の理論）",
 q:"バンデューラ（Bandura）の「自己効力感（self-efficacy）」の説明として最も適切なものはどれか。",
 ch:["自分の知的能力や才能は生まれつき固定されており、努力よりも持って生まれた素質が成果を決定するという、能力の変化可能性についての個人の信念","特定の状況において特定の行動をうまく遂行し、望ましい結果を達成できるという、自己の能力に対する主観的な確信","自分の行動の結果が、外部の運や状況ではなく、自分自身の努力や能力によってコントロールできると信じる程度を示す個人差の概念","過去の失敗経験があっても努力を続ければいつか成功できると楽観的に信じ、困難な課題にも諦めずに取り組もうとする動機づけの状態全般"],
 ans:1,
 exp:"自己効力感（Bandura, 1977）：「特定の状況で特定の行動をうまく遂行できる」という能力への確信。遂行経験・代理経験・言語的説得・生理的情動的状態の4要因から形成される。ア＝固定的知能観（Dweck）、ウ＝統制の所在（Rotter）、エ＝楽観性・レジリエンスに近い概念。",
 choiceExps:["誤り。知的能力は固定されていると信じる「固定的知能観（fixed mindset）」（Dweck）の説明。自己効力感は特定行動の遂行能力への確信であり、知能観とは異なる概念。","正しい。バンデューラの自己効力感の定義。「特定行動・特定状況」に限定された能力遂行への確信。遂行経験・代理経験・言語的説得・生理的情動的状態の4要因から形成される。","誤り。「統制の所在（locus of control）」（Rotter）の説明。内的統制（自己統制）・外的統制（運・他者）の概念。自己効力感は結果の統制可能性ではなく行動遂行能力への確信を指す。","誤り。楽観主義やレジリエンスに近い概念の説明。自己効力感は「特定の行動」「特定の状況」に限定された概念であり、一般的な楽観信念とは異なる。"]},

{id:901, cat:"教育時事",
 q:"文部科学省が推進する「GIGAスクール構想」に関する記述として最も適切なものはどれか。",
 ch:["GIGAスクール構想は主に高等学校を対象とし、大学入学共通テストのCBT（コンピュータ使用型試験）移行を見据えた情報活用能力育成のための1人1台端末整備を目的としている","全国の義務教育段階の児童生徒一人1台の端末と高速大容量の通信ネットワークの一体的整備を目標としている","GIGAスクール構想では1人1台端末の整備にあわせ、すべての授業でICTを活用することが各学校に義務付けられ、紙の教科書の使用は段階的に廃止するとされた","GIGAスクール構想では整備する端末の種類をWindowsタブレット1機種に統一することで、全国の教育ソフトウェアとの互換性と管理コストの削減を図るとされた"],
 ans:1,
 exp:"GIGAスクール構想（2019年〜）：GIGA＝Global and Innovation Gateway for All。義務教育段階の全児童生徒1人1台端末と高速ネットワークの一体的整備が主な内容。端末はWindows・iPad・Chromebookのいずれも可。授業でのICT活用義務化や紙教科書廃止は含まない。",
 choiceExps:["誤り。GIGAスクール構想の主対象は義務教育段階（小・中学校）の全児童生徒。CBT移行目的の高校向け施策という説明は誤り。","正しい。義務教育段階の児童生徒一人1台端末と高速大容量通信ネットワークの一体的整備が目標。「Global and Innovation Gateway for All」の略。","誤り。ICT環境の整備施策であり、すべての授業でのICT活用を義務付けたり紙の教科書を廃止するとはされていない。","誤り。端末はWindows・iPad・Chromebook等から各自治体が選択でき、機種は統一されていない。"]},

{id:902, cat:"教育時事",
 q:"令和3年の中央教育審議会答申「令和の日本型学校教育」において示された「個別最適な学び」に関する記述として正しいものはどれか。",
 ch:["「個別最適な学び」には「指導の個別化」と「学習の個性化」の2側面があり、「協働的な学び」と一体的に充実させることが重要とされた","「個別最適な学び」は「指導の個別化」と「学習の個性化」の2側面から成るが、GIGAスクール端末をすべての授業で活用することが前提条件とされており、ICT環境が整っていない学校への適用は保留とされた","「個別最適な学び」は、すべての生徒が同じ進度・内容で学ぶ一斉授業を廃止し、習熟度別の少人数授業に完全移行することで「指導の個別化」を実現するとされた","「個別最適な学び」と「協働的な学び」はそれぞれ独立した改革課題として示され、教科の特性に応じていずれかを重点的に選択して実施することが求められた"],
 ans:0,
 exp:"「令和の日本型学校教育」答申（令和3年）の核心。「個別最適な学び」＝指導の個別化＋学習の個性化の2側面。「協働的な学び」と一体的に充実させることが重要。ICT活用は手段であり必須前提条件ではない。一斉授業廃止は求めていない。",
 choiceExps:["正しい。「指導の個別化」「学習の個性化」の2側面と、「協働的な学び」との一体的充実が答申の核心。","誤り。答申はICT活用を推奨するが「GIGAスクール端末を全授業で使うことが前提条件」とは定めていない。ICT環境が整っていない学校への適用排除も示されていない。","誤り。「個別最適な学び」は一斉授業の廃止・習熟度別少人数授業への完全移行を求めるものではない。教師の指導を個々の状況に応じて柔軟にすることが趣旨。","誤り。答申では「個別最適な学び」と「協働的な学び」を「一体的に」充実させることを明示しており、どちらかを選択するよう求めてはいない。"]},

{id:903, cat:"教育時事",
 q:"OECD教育2030プロジェクトで提唱されている「ウェルビーイング（Well-being）」に関する説明として最も適切なものはどれか。",
 ch:["ウェルビーイングとは身体的・精神的な健康状態の総称であり、OECDはその達成度を国際学力調査（PISA）の読解・数学・科学の3分野の平均スコアと連動して測定するとした","個人と社会のウェルビーイングを実現するため、「知識・スキル・態度・価値観」を動員して行動する「エージェンシー」が重要とされる","ウェルビーイングは経済的豊かさと生活満足度のみを指す概念であり、OECDのラーニング・コンパスでは「豊かさの達成」を示すGDPの代替指標として提唱されている","ウェルビーイングは学校教育では測定が難しい概念であるため、OECDは各国の教育政策には組み込まず、医療・福祉分野の評価指標として位置づけている"],
 ans:1,
 exp:"OECDラーニング・コンパス2030：個人と社会のウェルビーイングを目指す方向性を示す。「学生エージェンシー（自らの学び・行動・将来を形成する力）」と「変革を起こすコンピテンシー」が核心。令和の日本型学校教育でも重要キーワード。",
 choiceExps:["誤り。ウェルビーイングはPISAの学力スコアと連動して測定されるものではない。身体的・精神的・社会的・情緒的な多面的な概念であり、学力テストのスコアとは異なる尺度で捉える。","正しい。OECDラーニング・コンパス2030の核心。知識・スキル・態度・価値観を動員して主体的に行動する「エージェンシー」が個人と社会のウェルビーイング実現に向けて重要とされる。","誤り。ウェルビーイングは経済的豊かさ・生活満足度だけでなく、精神的・社会的・情緒的な豊かさを含む多面的概念。GDPの代替指標という位置づけは不正確。","誤り。OECDはウェルビーイングを教育の目標として教育政策に積極的に組み込むことを提唱している。医療・福祉分野に限定した概念ではない。"]},

{id:904, cat:"教育時事",
 q:"文部科学省が提唱する「教育DX（デジタルトランスフォーメーション）」に関する記述として適切なものはどれか。",
 ch:["教育DXとは、従来の紙の教科書をすべてデジタル教科書に置き換えることのみを指す","学習履歴等の教育データを利活用し、個別最適な学びを実現するとともに、校務の効率化を図ることが含まれる","教育DXは私立学校のみを対象としており、公立学校は対象外である","教育DXにより教師の役割はなくなり、AIが授業を行うことが目標とされている"],
 ans:1,
 exp:"教育DXは学習eポータル・CBT・学習履歴データ活用・デジタル教科書・校務DX（文書の電子化等）を含む広い概念。令和7年度試験ではデータ利活用が論述テーマになるなど重要領域。",
 choiceExps:["誤り。教育DXはデジタル教科書の導入だけを指すのではなく、学習履歴データ活用・校務効率化・CBT等を含む幅広い概念。","正しい。教育DXは学習eポータル・CBT・データ利活用による個別最適な学び・校務の効率化等を含む広い概念。","誤り。教育DXは公立・私立を問わず学校全体を対象とした施策。私立学校のみが対象ではない。","誤り。教育DXはAIが教師の役割を代替することを目標とするものではなく、教師がICTを活用してより質の高い教育を実現することを目指す。"]},

{id:905, cat:"教育時事",
 q:"「ヤングケアラー」に関する記述として適切なものはどれか（令和6年度論述試験出題テーマ）。",
 ch:["ヤングケアラーとは、SNSやスマートフォンの過度な使用によって睡眠不足・学習への集中困難など生活習慣の乱れが生じており、学校生活に支障をきたしている18歳未満の子どもを指す","ヤングケアラーとは、本来大人が担うべき家事や家族の世話などを日常的に行っている18歳未満の子どもを指す","ヤングケアラーとは、地域の高齢者福祉施設や障害者支援施設で放課後に定期的にボランティア活動を行っている18歳未満の子どものことであり、学校は活動を奨励・支援する立場にある","ヤングケアラーへの対応は家庭の私的な事情に関わるため、学校は発見・支援に積極的に関与せず、厚生労働省管轄の福祉機関が家庭に直接介入する形で支援を行う"],
 ans:1,
 exp:"令和6年度論述試験出題テーマ。文科省・厚労省・内閣府が連携して対応。学校がヤングケアラーを早期発見し、スクールソーシャルワーカーや関係機関と連携して支援することが求められる。",
 choiceExps:["誤り。ヤングケアラーはスマートフォン依存とは無関係。家族のケア（介護・家事等）を担う子どもを指す概念。","正しい。ヤングケアラーの定義。本来大人が担うべき家事や家族の世話等を日常的に行っている18歳未満の子ども。","誤り。ヤングケアラーは本人の選択によるボランティアではなく、家庭の事情で担わざるを得ない状況。学校は関与すべき。","誤り。ヤングケアラーへの対応は文科省・厚労省・内閣府が連携する横断的施策。学校もスクールソーシャルワーカー等と連携して支援を行う。"]},

{id:1001, cat:"学習指導要領（情報編）",
 q:"高等学校学習指導要領（平成30年告示）における「情報Ⅰ」の目標（第1款）として最も適切に記述されているものはどれか。",
 ch:["情報と情報技術を活用した問題の発見・解決を行う学習活動を通して、問題の発見・解決に向けて情報と情報技術を適切かつ効果的に活用するとともに、情報社会に主体的に参画する態度を養う","コンピュータサイエンスの基礎的な知識・技術を体系的に習得し、プログラミングによるシステムの設計・実装ができる力を育てるとともに、情報の安全な管理と活用に必要な実践的技術を身に付ける","情報活用の実践力・情報の科学的な理解・情報社会に参画する態度の三観点から情報活用能力を育成し、社会における情報の意義と影響を理解しながら情報モラルに基づいた行動力を養う","既存の情報技術を使いこなす実践的な技術力と情報倫理意識を高めるとともに、プログラミングやデータ活用を通じて情報社会で求められる問題解決の基礎的な力を身に付ける"],
 ans:0,
 exp:"情報Ⅰは必履修科目。目標の文章構造は「〇〇を通して」（学習過程）→「〇〇できる力」（思考力等）→「態度を養う」（学びに向かう力）の三部構成。「問題の発見・解決」が重要なキーワード。",
 choiceExps:["正しい。情報Ⅰの目標（第1款）。「問題の発見・解決を行う学習活動を通して」「情報と情報技術を適切かつ効果的に活用する力」「情報社会に主体的に参画する態度を養う」が正確。","誤り。「コンピュータサイエンスの基礎的な知識・技術を習得しシステム設計・実装できる力」は目標の表現ではない。技術力の習得を中心に据えた誤った記述で、問題発見・解決という視点が欠けている。","誤り。「情報活用の実践力・情報の科学的な理解・情報社会に参画する態度の三観点」は旧学習指導要領（平成21年版）の表現。現行（平成30年告示）は三本柱の資質・能力（知識及び技能、思考力・判断力・表現力等、学びに向かう力・人間性等）で示す。","誤り。「既存の情報技術を使いこなす実践的な技術力」は目標の文言ではない。情報Ⅰは既存技術の習得にとどまらず、問題の発見・解決に向けて情報技術を適切・効果的に活用する力を重視している。"]},

{id:1002, cat:"学習指導要領（情報編）",
 q:"「情報Ⅰ」の内容の構成（4つの大項目）として正しいものはどれか。",
 ch:["(1)情報社会の問題解決、(2)コミュニケーションと情報デザイン、(3)コンピュータとプログラミング、(4)情報通信ネットワークとデータの活用","(1)情報倫理と法律、(2)情報技術の仕組み、(3)プログラミング基礎、(4)データベースとネットワーク","(1)コンピュータの科学的な理解、(2)情報の活用と創造、(3)情報社会への参画、(4)問題解決の実践","(1)コンピュータの仕組み、(2)インターネットとセキュリティ、(3)データ分析、(4)プログラミング応用"],
 ans:0,
 exp:"情報Ⅰの4項目：(1)情報社会の問題解決→情報倫理・法・問題発見、(2)コミュニケーションと情報デザイン→メディア・UX、(3)コンピュータとプログラミング→アルゴリズム・Python、(4)情報通信ネットワークとデータの活用→DB・統計。",
 choiceExps:["正しい。(1)情報社会の問題解決 (2)コミュニケーションと情報デザイン (3)コンピュータとプログラミング (4)情報通信ネットワークとデータの活用 が正確な4項目。","誤り。「情報倫理と法律」「情報技術の仕組み」「プログラミング基礎」「データベースとネットワーク」は正式な項目名ではない架空の構成。","誤り。「コンピュータの科学的な理解」「情報の活用と創造」「情報社会への参画」「問題解決の実践」は旧学習指導要領の表現に近い。","誤り。「インターネットとセキュリティ」「データ分析」「プログラミング応用」等は正式な項目名ではない。"]},

{id:1003, cat:"学習指導要領（情報編）",
 q:"「情報Ⅱ」の位置づけと内容に関する記述として適切なものはどれか。",
 ch:["情報Ⅱは情報Ⅰを履修した後に選択できる発展的な科目であり、標準単位数は4単位である","情報Ⅱは情報Ⅰの代わりとして履修できる選択科目であり、内容は情報Ⅰと同程度である","情報Ⅱはすべての高校生が必修で履修しなければならない","情報Ⅱにはデータサイエンスの手法やAIの基礎、コンテンツの制作・発信等の発展的内容が含まれる"],

{id:1101, cat:"情報Ⅰ（コンピュータ・2進数）",
 q:"次の2進数の加算の結果として正しいものはどれか。\n10110₂ + 01101₂",
 ch:["100001₂","100011₂","11011₂","100010₂"],
 ans:1,
 exp:"10110 = 22、01101 = 13、合計 = 35 = 32+2+1 = 100011₂。計算：各桁を右から 0+1=1、1+0=1、1+1=10(0繰上1)、0+1+1=10(0繰上1)、1+0+1=10(0繰上1)、繰上=1 → 100011₂。",
 choiceExps:["誤り。100001₂ = 33。10110(22) + 01101(13) = 35 ≠ 33。","正しい。100011₂ = 32+2+1 = 35。22+13=35 で一致。","誤り。11011₂ = 27。10110+01101 = 35 ≠ 27。桁上がりの計算ミス。","誤り。100010₂ = 34。10110+01101 = 35 ≠ 34。最下位ビットの計算ミス。"]},

{id:1102, cat:"情報Ⅰ（コンピュータ・2進数）",
 q:"10進数の整数「−6」を8ビットの2の補数で表したものはどれか。",
 ch:["10000110","11111010","11110110","10111010"],
 ans:1,
 exp:"6 = 00000110₂。1の補数 = 11111001₂。2の補数 = 11111001 + 1 = 11111010₂。確認：11111010 + 00000110 = 100000000（桁溢れ）→ 8ビットでは00000000 = 0。正しい。",
 choiceExps:["誤り。10000110は符号ビット=1で負数だが、−6の2の補数ではない。符号反転しただけで+1していない誤り。","正しい。6=00000110→1の補数=11111001→2の補数=11111010（-6を表す）。検算：11111010+00000110=100000000→8ビットで0。","誤り。11110110は−10を表す2の補数。−6の正しい2の補数は11111010。","誤り。10111010は別の値の2の補数。−6の2の補数は11111010が正しい。"]},

{id:1103, cat:"情報Ⅰ（コンピュータ・2進数）",
 q:"16進数「3F」を10進数に変換した値として正しいものはどれか。",
 ch:["47","57","63","51"],
 ans:2,
 exp:"3F₁₆ = 3×16¹ + F×16⁰ = 3×16 + 15×1 = 48 + 15 = 63。16進数のFは10進数の15に対応する。",
 choiceExps:["誤り。47 = 2F₁₆（2×16+15=47）。3×16+15=63なので47は誤り。","誤り。57 = 39₁₆（3×16+9=57）。Fは9ではなく15なので57は誤り。","正しい。3F₁₆ = 3×16 + 15 = 48+15 = 63。16進Fは10進15。","誤り。51 = 33₁₆（3×16+3=51）。Fは3ではなく15なので51は誤り。"]},

{id:1104, cat:"情報Ⅰ（論理回路）",
 q:"次の論理式と等価な式はどれか（ド・モルガンの法則）。\nNOT(A AND B)",
 ch:["NOT A AND NOT B","NOT A OR NOT B","A AND B","A OR B"],
 ans:1,
 exp:"ド・モルガンの法則：NOT(A AND B) = NOT A OR NOT B。また NOT(A OR B) = NOT A AND NOT B。真理値表で確認：A=1,B=0 のとき NOT(1 AND 0) = NOT 0 = 1、NOT 1 OR NOT 0 = 0 OR 1 = 1。",
 choiceExps:["誤り。NOT A AND NOT B はNOT(A OR B)と等価（もう一つのド・モルガン）。NOT(A AND B)とは異なる。","正しい。ド・モルガンの法則：NOT(A AND B) = NOT A OR NOT B。ANDとORが入れ替わる。","誤り。A AND B はNOT(A AND B)の否定であり等価でない。","誤り。A OR B はNOT(A AND B)と等価でない。A=1,B=1のとき NOT(1 AND 1)=0、1 OR 1=1で異なる。"]},

{id:1105, cat:"情報Ⅰ（アルゴリズム）",
 q:"次のPythonコードを実行したときの出力として正しいものはどれか。\n\ndef fib(n):\n    if n <= 1:\n        return n\n    return fib(n-1) + fib(n-2)\n\nprint(fib(7))",
 code:"def fib(n):\n    if n <= 1:\n        return n\n    return fib(n-1) + fib(n-2)\n\nprint(fib(7))",
 ch:["7","8","13","21"],
 ans:2,
 exp:"フィボナッチ数列：fib(0)=0, fib(1)=1, fib(2)=1, fib(3)=2, fib(4)=3, fib(5)=5, fib(6)=8, fib(7)=13。よって出力は13。",
 choiceExps:["誤り。7はfib(7)ではなく引数の値。fib(7)=fib(6)+fib(5)=8+5=13。","誤り。8はfib(6)の値。fib(7)=fib(6)+fib(5)=8+5=13なので一つ手前の値。","正しい。fib(7)=13。数列：0,1,1,2,3,5,8,13 → 7番目（0始まり）は13。","誤り。21はfib(8)の値。fib(8)=fib(7)+fib(6)=13+8=21なので一つ先の値。"]},

{id:1106, cat:"情報Ⅰ（アルゴリズム）",
 q:"次のPythonコードを実行したときの出力として正しいものはどれか。\n\ndata = [5, 3, 8, 1, 9, 2]\ndata.sort()\nprint(data[2], data[-2])",
 code:"data = [5, 3, 8, 1, 9, 2]\ndata.sort()\nprint(data[2], data[-2])",
 ch:["8 9","3 8","3 9","5 8"],
 ans:1,
 exp:"sort()後: [1, 2, 3, 5, 8, 9]。data[2] = 3（インデックス2）、data[-2] = 8（末尾から2番目）。出力: 3 8。",
 choiceExps:["誤り。sort()後は[1,2,3,5,8,9]。data[2]=8はインデックス2=3と混同。data[-2]=9はdata[-1]=9と混同した誤り。","正しい。sort()後[1,2,3,5,8,9]。インデックス2は3番目の要素=3、-2は末尾から2番目=8。出力「3 8」。","誤り。sort()後[1,2,3,5,8,9]。data[2]=3は正しいがdata[-2]=9は誤り（data[-1]=9、data[-2]=8）。","誤り。sort()前の元データdata[2]=8を参照した誤り。sort()後はdata[2]=3に変わっている。"]},

 ch:["6","9","15","10"],
 ans:0,
 exp:"range(1,6)は1,2,3,4,5。偶数は2と4。total = 2 + 4 = 6。",

{id:1109, cat:"情報Ⅰ（ネットワーク）",
 q:"TCP/IPに関する記述として正しいものはどれか。",
 ch:["TCPはコネクションレス型プロトコルで、データの到達保証はしない","TCPは3ウェイハンドシェイクで接続を確立し、データの順序保証・再送制御を行う","UDPはTCPと同様にデータの信頼性を保証するが処理が重い","IPはトランスポート層のプロトコルでポート番号を管理する"],
 ans:1,
 exp:"TCP：コネクション型、3ウェイハンドシェイク（SYN→SYN-ACK→ACK）、順序保証・再送制御・フロー制御あり。UDP：コネクションレス型、信頼性なし・高速。IPはネットワーク層でアドレッシング・ルーティングを担う。",
 choiceExps:["誤り。TCPはコネクション型（コネクション確立後通信）でデータの到達保証あり。コネクションレス型はUDP。","正しい。TCPは3ウェイハンドシェイク（SYN→SYN-ACK→ACK）でコネクション確立し、順序保証・再送制御を行う。","誤り。UDPはTCPと異なりコネクションレス型で信頼性保証なし。高速・低遅延が特徴（動画配信・DNS等に使用）。","誤り。IPはネットワーク層（第3層）のプロトコル。ポート番号を管理するのはトランスポート層のTCP/UDP。"]},

{id:1110, cat:"情報Ⅰ（ネットワーク）",
 q:"OSI参照モデルの第3層（ネットワーク層）の機能として最も適切なものはどれか。",
 ch:["ビット列の物理的な伝送（電気信号・光信号への変換）","MACアドレスを用いた同一ネットワーク内のフレーム転送","IPアドレスによるパケットのルーティング（経路選択）","アプリケーション間のデータの変換・暗号化"],
 ans:2,
 exp:"OSI参照モデル：第1層(物理)→第2層(データリンク:MAC)→第3層(ネットワーク:IP・ルーティング)→第4層(トランスポート:TCP/UDP・ポート)→第5-7層(セッション・プレゼンテーション・アプリケーション)。",
 choiceExps:["誤り。ビット列の物理的な伝送（電気信号・光信号への変換）は第1層（物理層）の機能。第3層ではない。","誤り。MACアドレスを用いたフレーム転送は第2層（データリンク層）の機能。第3層はIPアドレスを使用。","正しい。第3層はネットワーク層。IPアドレスによるパケットのルーティング（経路選択）が主な機能。","誤り。データの変換・暗号化は第6層（プレゼンテーション層）の機能。第3層はルーティング担当。"]},

{id:1111, cat:"情報Ⅰ（情報セキュリティ）",
 q:"情報セキュリティの「CIA」が示す三要素として正しいものはどれか。",
 ch:["機密性（Confidentiality）・完全性（Integrity）・可用性（Availability）","機密性（Confidentiality）・整合性（Integration）・認証性（Authentication）","信頼性（Credibility）・完全性（Integrity）・可用性（Availability）","機密性（Confidentiality）・完全性（Integrity）・監査性（Auditability）"],
 ans:0,
 exp:"情報セキュリティのCIA：①機密性(Confidentiality)=許可された者のみアクセス可能、②完全性(Integrity)=データが正確で改ざんされていない、③可用性(Availability)=必要な時にアクセス可能。JIS Q 27001も同定義。",
 choiceExps:["正しい。CIAの三要素：Confidentiality（機密性）・Integrity（完全性）・Availability（可用性）。JIS Q 27001の定義に一致。","誤り。「整合性（Integration）」はCIAの構成要素ではない。正しくは「完全性（Integrity）」。「認証性（Authentication）」もCIAではない。","誤り。「信頼性（Credibility）」はCIAの構成要素ではない。正しい「C」は「機密性（Confidentiality）」。","誤り。「監査性（Auditability）」はCIAの構成要素ではない。正しい「A」は「可用性（Availability）」。"]},

{id:1112, cat:"情報Ⅰ（情報セキュリティ）",
 q:"公開鍵暗号方式に関する記述として正しいものはどれか。",
 ch:["送信者と受信者が同じ鍵を使って暗号化・復号する方式である","公開鍵で暗号化されたデータは、対応する秘密鍵でのみ復号できる","公開鍵暗号方式は共通鍵暗号方式より暗号化・復号の処理速度が速い","デジタル署名では送信者の公開鍵を使って署名を生成する"],
 ans:1,
 exp:"公開鍵暗号方式：公開鍵で暗号化→秘密鍵で復号（機密性）。秘密鍵で署名→公開鍵で検証（真正性）。共通鍵より処理が遅い。RSA・楕円曲線暗号などが代表例。共通鍵を交換するためのプロトコル（TLS等）でも利用。",
 choiceExps:["誤り。送信者と受信者が同じ鍵を使う方式は「共通鍵暗号方式（対称鍵暗号方式）」。公開鍵暗号方式は鍵のペア（公開鍵・秘密鍵）を使用。","正しい。公開鍵（誰でも知れる）で暗号化し、対応する秘密鍵（受信者のみが持つ）でのみ復号できる。","誤り。公開鍵暗号方式は共通鍵暗号方式より処理が遅い（計算コストが高い）。TLSでは鍵交換にのみ使用し、データ本体は共通鍵を使う。","誤り。デジタル署名では「送信者の秘密鍵」で署名を生成し、「送信者の公開鍵」で検証する。公開鍵で署名を生成するのは誤り。"]},

{id:1113, cat:"情報Ⅰ（情報セキュリティ）",
 q:"デジタル署名に関する記述として正しいものはどれか。",
 ch:["送信者が受信者の公開鍵で署名を作成し、受信者が自分の秘密鍵で検証する","送信者が自分の秘密鍵で署名を作成し、受信者が送信者の公開鍵で検証する","デジタル署名は暗号化が目的であり、なりすまし防止には使えない","デジタル署名によりデータの機密性（第三者への秘匿）が保証される"],
 ans:1,
 exp:"デジタル署名：①送信者が秘密鍵でハッシュ値に署名→②受信者が送信者の公開鍵で検証。目的は「なりすまし防止（真正性）」「改ざん検知（完全性）」「否認防止」。機密性（秘匿）は目的ではない。",
 choiceExps:["誤り。署名は「送信者の秘密鍵」で生成し「送信者の公開鍵」で検証する。受信者の公開鍵で暗号化するのは公開鍵暗号方式による暗号化。","正しい。送信者が自分の秘密鍵でハッシュ値に署名し、受信者が送信者の公開鍵で検証する。なりすまし防止・改ざん検知・否認防止が目的。","誤り。デジタル署名の目的は真正性・完全性・否認防止の確保。データの暗号化（機密性）はデジタル署名の目的ではない。","誤り。デジタル署名によって機密性（第三者への秘匿）は保証されない。機密性には公開鍵暗号方式による暗号化が必要。"]},

{id:1114, cat:"情報Ⅰ（情報セキュリティ）",
 q:"ハッシュ関数の性質として誤っているものはどれか。",
 ch:["同じ入力値に対して常に同じハッシュ値を出力する（一貫性）","ハッシュ値から元のデータを復元することは計算上困難である（一方向性）","ハッシュ値が同じであれば、必ず元のデータも同じである","異なる入力に対して同じハッシュ値が生じることを「衝突」という"],
 ans:2,
 exp:"ハッシュ関数は「多対1」の関係のため、異なる入力から同じハッシュ値が生じる「衝突」が原理上起こりうる（MD5は衝突が発見され廃止）。「ハッシュ値が同じ→元データも同じ」は誤り。",
 choiceExps:["正しい性質（含まれる）。同じ入力に対して常に同じハッシュ値を返す一貫性は正しい性質。「誤っているもの」ではない。","正しい性質（含まれる）。ハッシュ値から元データを復元することは計算上困難（一方向性）。暗号学的ハッシュ関数の重要な性質。","これが答え（誤っている性質）。ハッシュ関数は多対1のため衝突が原理上起こりうる。「ハッシュ値が同じ→元データも同じ」は誤り。","正しい性質（含まれる）。異なる入力から同じハッシュ値が生じることを「衝突」という。MD5等で実際に衝突が発見されている。"]},

{id:1115, cat:"情報Ⅰ（データベース）",
 q:"次のSQL文を実行したときの結果として正しいものはどれか。\n\n【生徒テーブル】\n| 氏名 | 点数 |\n|------|------|\n| 田中 |  75  |\n| 佐藤 |  90  |\n| 鈴木 |  85  |\n| 山田 |  60  |\n\nSELECT 氏名 FROM 生徒 WHERE 点数 >= 80 ORDER BY 点数 DESC;",
 ch:["田中、佐藤、鈴木、山田","佐藤、鈴木","鈴木、佐藤","佐藤、田中"],
 ans:1,
 exp:"WHERE 点数>=80 で佐藤(90)と鈴木(85)が抽出。ORDER BY 点数 DESC（降順）で佐藤(90)→鈴木(85)の順。出力される列は「氏名」のみ。よって「佐藤、鈴木」の順で出力される。",
 choiceExps:["誤り。WHERE 点数>=80 で田中(75)と山田(60)は除外される。全件出力は条件を無視した誤り。","正しい。WHERE点数>=80で佐藤(90)・鈴木(85)が抽出。ORDER BY 点数 DESC（降順）で佐藤→鈴木の順。SELECT氏名のみ出力。","誤り。ORDER BY 点数 DESCは降順（大きい順）なので佐藤(90)→鈴木(85)の順。ASC（昇順）と混同した誤り。","誤り。田中(75)は点数>=80の条件を満たさない（75<80）ため抽出されない。"]},

{id:1116, cat:"情報Ⅰ（データベース）",
 q:"関係データベースの正規化において「第三正規形」の説明として正しいものはどれか。",
 ch:["繰り返しグループ（多値属性）を排除した状態","非キー属性が主キーの一部にのみ依存する「部分関数従属」を排除した状態","第二正規形の条件を満たした上で、非キー属性が他の非キー属性に依存する「推移的関数従属」を排除した状態","すべての結合従属性がキー制約のみから導かれる状態"],
 ans:2,
 exp:"正規化：第1正規形=繰り返し排除、第2正規形=部分関数従属排除、第3正規形=推移的関数従属排除（A→B→Cの連鎖依存を排除）、ボイス・コッド正規形以降はさらに高度。",
 choiceExps:["誤り。繰り返しグループ（多値属性）の排除は第1正規形の条件。第3正規形ではない。","誤り。非キー属性が主キーの一部にのみ依存する「部分関数従属」の排除は第2正規形の条件。","正しい。第3正規形の条件：第2正規形を満たし、かつ非キー属性間の推移的関数従属（A→B→CのようなC→Aへの間接依存）を排除した状態。","誤り。すべての結合従属性がキー制約のみから導かれる状態は第5正規形（射影結合正規形）の条件。"]},


// ---- 情報Ⅰ（著作権・情報法規） ----
{id:1201, cat:"情報Ⅰ（著作権・情報法規）",
 q:"著作権法に関する記述として正しいものはどれか。",
 ch:["著作権は著作物を創作した時点で自動的に発生し、登録や申請は不要である（無方式主義）","著作者人格権は著作者の死後に著作権とともに消滅する","インターネット上に公開されている画像は、著作権表示がなければ自由に利用できる","プログラムの著作権は、そのプログラムを使用したユーザーに帰属する"],
 ans:0,
 exp:"日本の著作権法は無方式主義を採用。著作物を創作した時点で著作権が自動発生し、登録・手続きは不要。著作権の保護期間は原則として著作者の死後70年間。",
 choiceExps:["正しい。無方式主義（著作権法第17条第2項）。創作の事実のみで権利が発生する。","誤り。著作者人格権（公表権・氏名表示権・同一性保持権）は著作者の一身専属権で、著作権（財産権）が消滅した後も保護される。","誤り。著作権表示の有無にかかわらず著作権は存在する。ネット上の画像も原則として著作権保護の対象。","誤り。プログラムの著作権は原則としてプログラムを作成した著作者（または法人）に帰属する。使用者には帰属しない。"]},

{id:1202, cat:"情報Ⅰ（著作権・情報法規）",
 q:"不正競争防止法・不正アクセス禁止法に関する記述として適切でないものはどれか。",
 ch:["不正アクセス禁止法は、アクセス権限のない者が他人のIDとパスワードを使ってコンピュータに不正侵入する行為を禁止している","フィッシング詐欺でIDとパスワードを不正取得する行為は不正アクセス禁止法の対象となる","自分自身のコンピュータにアクセスすることも不正アクセス禁止法の対象となる","他人のIDとパスワードを無断で第三者に提供する行為も不正アクセス禁止法で禁止されている"],
 ans:2,
 exp:"不正アクセス禁止法は「他人の」コンピュータへの不正アクセスを規制する法律。自分のコンピュータへのアクセスは対象外。IDの不正取得・提供・保管行為も禁止。",
 choiceExps:["正しい規定。不正アクセス禁止法第3条でアクセス制御を免れる行為（IDパスワード悪用等）が禁止されている。「適切でない」ではない。","正しい規定。フィッシング詐欺等によるIDパスワードの不正取得行為は第7条で禁止されている。「適切でない」ではない。","これが答え（適切でない記述）。自分自身のコンピュータへのアクセスは「不正アクセス」に該当しない。","正しい規定。他人のIDパスワードを無断で第三者に提供する行為は第5条で禁止されている。「適切でない」ではない。"]},

{id:1203, cat:"情報Ⅰ（著作権・情報法規）",
 q:"個人情報保護法に関する記述として正しいものはどれか。",
 ch:["個人情報とは、生存する個人に関する情報で、氏名・生年月日等により特定の個人を識別できるものをいう","個人情報は本人の同意がなくても、第三者への提供を自由に行うことができる","故人（死者）の個人情報も個人情報保護法の保護対象となる","個人情報データベースが5000件未満であれば、個人情報保護法は適用されない"],
 ans:0,
 exp:"個人情報保護法第2条第1項の定義。「生存する個人」の情報で特定個人を識別できるもの。第三者提供は原則として本人の同意が必要（第27条）。",
 choiceExps:["正しい。個人情報保護法第2条第1項の定義に一致。「生存する個人」に関する情報で特定個人を識別できるもの。","誤り。個人情報の第三者提供は原則として本人の同意が必要（第27条）。オプトアウト等の例外規定はあるが自由ではない。","誤り。個人情報保護法が保護するのは「生存する個人」に関する情報のみ。故人（死者）の情報は原則として対象外。","誤り。かつての「5000件未満免除」は2017年改正で廃止。規模にかかわらず個人情報を扱うすべての事業者が対象となった。"]},

{id:1204, cat:"情報Ⅰ（著作権・情報法規）",
 q:"情報モラルに関する問題として、SNSの利用に関する記述として最も適切なものはどれか。",
 ch:["他人を批判する投稿でも匿名であれば法的責任は問われない","一度インターネットに投稿した情報は、削除しても完全に消去することが困難である（デジタルタトゥー）","友人の写真をSNSに投稿する行為は、友人が同意していれば著作権の問題は一切生じない","インターネット上の匿名コメントは、発信者を特定することは技術的に不可能である"],
 ans:1,
 exp:"デジタルタトゥー：一度インターネットに投稿された情報はキャッシュ・スクリーンショット等で拡散・保存されるため、削除後も完全消去は困難。匿名でも発信者情報開示請求により特定可能。",
 choiceExps:["誤り。匿名でも名誉毀損・侮辱罪・プロバイダ責任制限法による発信者情報開示請求等で法的責任が問われる場合がある。","正しい。デジタルタトゥーの概念。一度公開した情報はキャッシュ・転載等で残り続け完全削除は困難。","誤り。他人の写真には被写体のプライバシー権・肖像権・写真の著作権が関係する。本人の同意だけで著作権問題がすべて解決するわけではない。","誤り。プロバイダ責任制限法に基づく発信者情報開示請求等により、匿名コメントでも発信者の特定が可能な場合がある。"]},

{id:1301, cat:"情報Ⅰ（統計・データ分析）",
 q:"次のデータの平均値・中央値・最頻値として正しいものはどれか。\nデータ：2, 4, 4, 6, 8, 8, 8, 10",
 ch:["平均値=6.25、中央値=7、最頻値=8","平均値=6.25、中央値=7、最頻値=4","平均値=6.5、中央値=7、最頻値=8","平均値=6.25、中央値=8、最頻値=8"],
 ans:0,
 exp:"平均値=(2+4+4+6+8+8+8+10)/8=50/8=6.25。中央値=8件の4番目と5番目の平均=(6+8)/2=7。最頻値=最も多く出現する値=8（3回）。",
 choiceExps:["正しい。平均値6.25・中央値7・最頻値8がすべて正確。計算：合計50÷8=6.25、(6+8)÷2=7、8が3回で最多。","誤り。最頻値は4（2回）ではなく8（3回）が正しい。","誤り。平均値は50/8=6.25であり6.5ではない。6.5は誤った計算値。","誤り。中央値は8件の中央（4番目と5番目の平均）。4番目=6、5番目=8、平均=(6+8)/2=7であり8ではない。"]},

{id:1302, cat:"情報Ⅰ（統計・データ分析）",
 q:"相関係数に関する記述として正しいものはどれか。",
 ch:["相関係数が0.9の場合、一方の変数が増加すると他方も増加する強い正の相関関係がある","相関係数が−1に近い場合、2変数の間に相関関係はない","相関係数が0である場合、2変数の間に必ず因果関係もない","相関係数は必ず0以上の値をとる"],
 ans:0,
 exp:"相関係数の範囲は−1〜1。1に近いほど強い正の相関、−1に近いほど強い負の相関、0に近いほど相関が弱い。相関は因果を意味しない（疑似相関の可能性あり）。",
 choiceExps:["正しい。相関係数0.9は強い正の相関を示す。一般に|r|>0.7程度で強い相関とされる。","誤り。相関係数が−1に近いほど強い負の相関（一方が増えると他方が減る）がある。相関なしは0に近い値。","誤り。相関係数が0でも因果関係がない証明にはならない（相関は因果の必要条件ではない）。また非線形の関係は相関係数0でも関係がある場合がある。","誤り。相関係数は−1から1の範囲の値をとる。負の相関の場合は負の値になる。"]},

{id:1303, cat:"情報Ⅰ（統計・データ分析）",
 q:"次のPythonコードを実行したときの出力として正しいものはどれか。\n\ndata = [3, 7, 1, 5, 9, 2, 6]\nprint(max(data) - min(data))\nprint(sum(data) / len(data))",
 code:"data = [3, 7, 1, 5, 9, 2, 6]\nprint(max(data) - min(data))\nprint(sum(data) / len(data))",
 ch:["8\n4.0","8\n4.714285714285714","9\n4.714285714285714","8\n5.0"],
 ans:1,
 exp:"max=9、min=1、範囲=9-1=8。sum=3+7+1+5+9+2+6=33、len=7、平均=33/7≈4.714285...。Pythonの割り算は浮動小数点で返す。",
 choiceExps:["誤り。max-min=9-1=8は正しいが、平均=33/7≒4.714...であり4.0ではない。","正しい。max-min=8、sum/len=33/7=4.714285714285714が正確な出力。","誤り。max-min=9-1=8であり9ではない。maxの値9と混同した誤り。","誤り。sum=33、len=7。33/7≒4.714...であり5.0ではない（5.0は35/7）。"]},

{id:1304, cat:"情報Ⅰ（統計・データ分析）",
 q:"データの可視化に関する記述として最も適切なものはどれか。",
 ch:["棒グラフは2変数の相関関係を示すのに最も適したグラフである","散布図は各カテゴリの量を比較するのに最も適したグラフである","度数分布を示すためにはヒストグラムが適しており、棒グラフとは横軸の解釈が異なる","折れ線グラフはデータの内訳（構成比）を示すのに最も適したグラフである"],
 ans:2,
 exp:"ヒストグラムは量的データの度数分布を示す。横軸が数値の範囲（階級）で隣接するバーは連続的。棒グラフはカテゴリ別の量比較で横軸はカテゴリ。散布図は2変数の相関に適する。",
 choiceExps:["誤り。2変数の相関関係を示すのに適しているのは散布図（XY散布図）。棒グラフはカテゴリ別の量比較に適する。","誤り。カテゴリ別の量を比較するのに適しているのは棒グラフ。散布図は2変数の相関関係の可視化に使用する。","正しい。ヒストグラムは量的データの度数分布を示す。横軸が数値の連続した範囲（階級）で、棒グラフとは概念が異なる。","誤り。データの内訳（構成比）を示すのに適しているのは円グラフや積み上げ棒グラフ。折れ線グラフは時系列変化の可視化に適する。"]},

{id:1401, cat:"情報Ⅰ（AI・機械学習）",
 q:"機械学習の学習方式に関する記述として正しいものはどれか。",
 ch:["教師あり学習とは、ラベル（正解）のないデータからパターンを発見する学習方式である","強化学習とは、エージェントが環境との相互作用の中で報酬を最大化するように学習する方式である","教師なし学習では、訓練データに正解ラベルが付与されており、入力と出力の対応を学習する","ニューラルネットワークは教師あり学習にのみ使用でき、教師なし学習には使用できない"],
 ans:1,
 exp:"強化学習（Reinforcement Learning）：エージェントが環境の中で行動し、報酬（正のフィードバック）を最大化するように試行錯誤を通じて学習する。囲碁AI（AlphaGo）や自動運転で活用。",
 choiceExps:["誤り。ラベルのないデータからパターンを発見するのは「教師なし学習」（クラスタリング等）。教師あり学習は正解ラベルありのデータで学習する。","正しい。強化学習の定義。エージェントが環境との相互作用を通じて報酬を最大化する方策を学習する。","誤り。訓練データに正解ラベルが付与されており入出力の対応を学習するのは「教師あり学習」（分類・回帰）の説明。","誤り。ニューラルネットワークは教師あり学習・教師なし学習・強化学習いずれにも使用できる汎用的な手法。"]},

{id:1402, cat:"情報Ⅰ（AI・機械学習）",
 q:"人工知能（AI）に関する記述として適切でないものはどれか。",
 ch:["深層学習（ディープラーニング）は、多層のニューラルネットワークを使って特徴量を自動的に抽出・学習する技術である","現在の生成AIは、大量のテキストデータで学習した大規模言語モデル（LLM）を基盤としているものが多い","AIは一度学習が完了すれば、その後どのような新しい状況でも完璧に対応できる","AIによる判断の根拠が不明瞭な問題を「ブラックボックス問題」と呼ぶ"],
 ans:2,
 exp:"現在のAI（機械学習モデル）は学習データの分布内のデータには高精度だが、学習データの分布外の状況や未知のケースには対応困難なことがある。汎化能力の限界がある。",
 choiceExps:["正しい説明。深層学習は多層ニューラルネットワークで特徴量を自動抽出する技術。画像認識・音声認識・自然言語処理で高い性能を発揮。「適切でない」ではない。","正しい説明。ChatGPT等の生成AIはTransformerアーキテクチャに基づくLLM（大規模言語モデル）を基盤とする。「適切でない」ではない。","これが答え（適切でない記述）。現在のAIは汎化能力に限界があり、学習データ外の状況や新しいドメインへの対応には困難を伴う。「完璧に対応できる」は誤り。","正しい説明。AIの判断根拠が不明瞭な問題は「ブラックボックス問題」。説明可能AI（XAI）の研究が進んでいる。「適切でない」ではない。"]},

{id:1501, cat:"情報Ⅰ（アルゴリズム）",
 q:"次のPythonコードを実行したときの出力として正しいものはどれか。\n\ndef func(lst, target):\n    left, right = 0, len(lst) - 1\n    while left <= right:\n        mid = (left + right) // 2\n        if lst[mid] == target:\n            return mid\n        elif lst[mid] < target:\n            left = mid + 1\n        else:\n            right = mid - 1\n    return -1\n\nprint(func([1,3,5,7,9,11,13], 7))",
 code:"def func(lst, target):\n    left, right = 0, len(lst) - 1\n    while left <= right:\n        mid = (left + right) // 2\n        if lst[mid] == target:\n            return mid\n        elif lst[mid] < target:\n            left = mid + 1\n        else:\n            right = mid - 1\n    return -1\n\nprint(func([1,3,5,7,9,11,13], 7))",
 ch:["2","3","4","−1"],
 ans:1,
 exp:"これは二分探索（binary search）アルゴリズム。リスト[1,3,5,7,9,11,13]でtarget=7を探索。初回mid=(0+6)//2=3、lst[3]=7=target → インデックス3を返す。",
 choiceExps:["誤り。インデックス2はlst[2]=5。7はインデックス3に存在する。","正しい。二分探索の動作：left=0,right=6→mid=3→lst[3]=7=target→return 3。","誤り。インデックス4はlst[4]=9。targetの7はインデックス3に存在する。","誤り。−1は値が見つからない場合の戻り値。7はリストに存在するため−1は返らない。"]},

{id:1502, cat:"情報Ⅰ（アルゴリズム）",
 q:"次のPythonコードを実行したときの出力として正しいものはどれか。\n\nresult = []\nfor i in range(1, 6):\n    if i ** 2 > 10:\n        result.append(i)\nprint(result)",
 code:"result = []\nfor i in range(1, 6):\n    if i ** 2 > 10:\n        result.append(i)\nprint(result)",
 ch:["[1, 2, 3, 4, 5]","[4, 5]","[3, 4, 5]","[11, 16, 25]"],
 ans:1,
 exp:"i=1:1²=1≤10→False、i=2:4≤10→False、i=3:9≤10→False、i=4:16>10→True、i=5:25>10→True。条件を満たすのはi=4と5のみ。結果は[4, 5]。",
 choiceExps:["誤り。全要素を追加した場合の誤り。i**2>10の条件でフィルタリングされる。","正しい。i=4:16>10→True、i=5:25>10→True。i=1〜3はi**2≤10なので除外。結果は[4, 5]。","誤り。i=3:3**2=9、9>10はFalse。9は10より大きくないため3は含まれない。","誤り。resultにはiの値を追加するコード。i**2（二乗した値）を追加するわけではない。"]},

{id:1503, cat:"情報Ⅰ（アルゴリズム）",
 q:"バブルソートに関する記述として正しいものはどれか。",
 ch:["バブルソートの最悪時計算量はO(n log n)であり、クイックソートと同等の性能を持つ","バブルソートは隣接する要素を比較・交換しながらデータを整列する。最悪時計算量はO(n²)","バブルソートは常にデータの先頭から最小値を選択して先頭に移動する整列法である","バブルソートはデータを半分ずつに分割して再帰的に整列する分割統治法を用いる"],
 ans:1,
 exp:"バブルソートは隣接要素を比較して必要なら交換を繰り返す。最悪・平均でO(n²)。実装は単純だが大規模データには非効率。最小値選択はセレクションソート、分割統治はマージソート・クイックソート。",
 choiceExps:["誤り。バブルソートの最悪計算量はO(n²)。O(n log n)はマージソート・ヒープソート・クイックソート（平均）の計算量。","正しい。バブルソートの動作説明と最悪計算量O(n²)の記述が正確。","誤り。データの先頭から最小値を選択して先頭に移動するのは「選択ソート（セレクションソート）」の動作説明。","誤り。データを半分ずつに分割して再帰的に整列する分割統治法は「マージソート」や「クイックソート」の説明。"]},

{id:1601, cat:"情報Ⅰ（ネットワーク）",
 q:"HTTPSに関する記述として正しいものはどれか。",
 ch:["HTTPSはHTTPと比較してデータ転送速度が向上するプロトコルである","HTTPSはTLS（Transport Layer Security）を使ってデータを暗号化するHTTPである","HTTPSを使用するWebサイトはサーバー証明書が不要であり、誰でも無料で設定できる","HTTPSは第3層（ネットワーク層）のプロトコルであり、IPアドレスを暗号化する"],
 ans:1,
 exp:"HTTPS = HTTP over TLS（旧称SSL）。TLSで通信を暗号化し、サーバー証明書で真正性を確認する。ポート番号443を使用。サーバー証明書はCA（認証局）が発行する。",
 choiceExps:["誤り。HTTPSは暗号化処理のオーバーヘッドがあるため、HTTPより若干速度が低下する場合がある。速度向上が目的ではなくセキュリティが目的。","正しい。HTTPSはHTTP+TLS（Transport Layer Security）。TLSによる暗号化で盗聴防止・改ざん検知・なりすまし防止を実現。","誤り。HTTPSを使用するにはCA（認証局）が発行したサーバー証明書が必要。無料の証明書（Let's Encrypt等）はあるが証明書自体は必要。","誤り。HTTPSはアプリケーション層のプロトコル。IPアドレスではなくHTTPの通信内容（ヘッダー・ボディ）を暗号化する。"]},

{id:1602, cat:"情報Ⅰ（ネットワーク）",
 q:"DNSの機能として正しいものはどれか。",
 ch:["DNSはIPアドレスをMACアドレスに変換する仕組みである","DNSはドメイン名（例：www.example.com）をIPアドレスに変換する名前解決の仕組みである","DNSはデータを暗号化してセキュアな通信を実現するプロトコルである","DNSはIPパケットのルーティング（経路選択）を担うプロトコルである"],
 ans:1,
 exp:"DNS（Domain Name System）はドメイン名からIPアドレスへの変換（名前解決）を担うシステム。ポート番号53を使用。IPからMACアドレスへの変換はARP（Address Resolution Protocol）。",
 choiceExps:["誤り。IPアドレスをMACアドレスに変換するのはARP（Address Resolution Protocol）。DNSはドメイン名→IPアドレスの変換を行う。","正しい。DNS（Domain Name System）の主な機能。ドメイン名をIPアドレスに変換する名前解決サービス。","誤り。データを暗号化してセキュアな通信を実現するのはTLS（SSL）。DNS自体は通常暗号化されていない（DNS over HTTPSは暗号化拡張）。","誤り。IPパケットのルーティング（経路選択）を担うのはルーターとルーティングプロトコル（OSPF・BGP等）。DNSの役割ではない。"]},

{id:1701, cat:"情報Ⅰ（情報セキュリティ）",
 q:"マルウェアに関する記述として正しいものはどれか。",
 ch:["ランサムウェアはコンピュータを乗っ取って他のシステムへのDDoS攻撃に使用するマルウェアである","トロイの木馬は、正規のソフトウェアに見せかけて侵入し、バックドアの設置等の悪意ある動作を行うマルウェアである","コンピュータウイルスは必ずインターネット接続がなくても感染が拡大する","スパイウェアはコンピュータ内のファイルを暗号化して身代金を要求するマルウェアである"],
 ans:1,
 exp:"トロイの木馬：正規ソフト・ゲームに偽装して侵入。バックドア設置・情報窃取等。自己複製はしない。ランサムウェア：ファイル暗号化・身代金要求。ボットネット：DDoS攻撃等に利用。",
 choiceExps:["誤り。コンピュータを乗っ取ってDDoS攻撃に使うマルウェアは「ボット（bot）」またはボットネット。ランサムウェアはファイルの暗号化・身代金要求が目的。","正しい。トロイの木馬の説明。正規ソフトウェアに偽装して侵入し、バックドア設置・情報窃取等の悪意ある動作を行う。","誤り。コンピュータウイルスの感染経路はインターネット・USBメモリ・ネットワーク等多様。インターネット接続がない環境でもUSB等で感染拡大しうる。","誤り。コンピュータ内のファイルを暗号化して身代金（ransom）を要求するのは「ランサムウェア（ransomware）」。スパイウェアはユーザーの行動・情報を収集して送信するマルウェア。"]},

{id:1702, cat:"情報Ⅰ（情報セキュリティ）",
 q:"情報セキュリティの攻撃手法に関する記述として適切でないものはどれか。",
 ch:["フィッシング攻撃とは、実在する企業を装った偽のメール・Webサイトで個人情報を詐取する攻撃である","SQLインジェクションとは、Webアプリケーションの入力フォームに不正なSQL文を埋め込んで、データベースを不正に操作する攻撃である","DDoS攻撃とは、多数のコンピュータから特定サーバーに大量のリクエストを送りサービスを妨害する攻撃である","ソーシャルエンジニアリングとは、高度なマルウェアを使ってコンピュータのOSを直接攻撃する技術的手法である"],
 ans:3,
 exp:"ソーシャルエンジニアリングは「技術的手法ではなく」人間の心理的隙・行動を利用した情報搾取手法。なりすまし電話・覗き見（ショルダーハッキング）・不正侵入等が含まれる。",
 choiceExps:["正しい説明。フィッシング攻撃（phishing）の定義。実在組織を装ったメールで偽サイトに誘導し、IDパスワード・クレカ情報等を詐取する。「適切でない」ではない。","正しい説明。SQLインジェクションの定義。入力フォームへのSQL文埋め込みでDBの不正操作・情報漏洩を引き起こす。「適切でない」ではない。","正しい説明。DDoS（Distributed Denial of Service）攻撃の定義。多数のコンピュータから攻撃しサービスを不能にする。「適切でない」ではない。","これが答え（適切でない記述）。ソーシャルエンジニアリングは技術的手法ではなく、人間の心理・行動の隙を突いた非技術的な情報詐取手法（なりすまし・覗き見等）。"]},

{id:1703, cat:"情報Ⅰ（情報セキュリティ）",
 q:"多要素認証（MFA）に関する記述として正しいものはどれか。",
 ch:["多要素認証とは、複数の長いパスワードを組み合わせて使用する認証方式である","多要素認証では、知識・所持・生体の3つの認証要素のうち2つ以上を組み合わせて認証する","多要素認証を導入すれば、フィッシング攻撃によるアカウント乗っ取りを100%防ぐことができる","多要素認証はスマートフォンがなければ利用できない認証方式である"],
 ans:1,
 exp:"多要素認証（MFA）の三要素：①知識（パスワード・PIN）②所持（スマホ・ハードウェアトークン）③生体（指紋・顔認証）。2つ以上の要素を組み合わせてセキュリティを強化する。",
 choiceExps:["誤り。多要素認証は「複数の長いパスワード」ではなく、異なる種類の認証要素（知識・所持・生体）を組み合わせる方式。同種の要素（パスワード×2）は多要素認証とは言わない。","正しい。MFAは知識要素・所持要素・生体要素のうち異なる種類の2つ以上を組み合わせる認証方式。","誤り。多要素認証でもフィッシング（特にリアルタイム中間者攻撃）には対策が必要な場合がある。「100%防ぐ」は過言。","誤り。所持要素にはスマートフォン以外にも物理的なセキュリティキー（YubiKey等）やワンタイムパスワードトークンも含まれる。"]},

{id:1801, cat:"情報Ⅰ（データベース）",
 q:"次のSQL文の実行結果として正しいものはどれか。\n\n【商品テーブル】\n| 商品ID | 商品名   | 価格  | 分類  |\n|--------|---------|-------|------|\n| 001    | りんご   | 150   | 果物 |\n| 002    | バナナ   | 100   | 果物 |\n| 003    | にんじん | 80    | 野菜 |\n| 004    | ぶどう   | 300   | 果物 |\n| 005    | たまねぎ | 50    | 野菜 |\n\nSELECT 分類, COUNT(*) AS 件数, AVG(価格) AS 平均価格\nFROM 商品\nGROUP BY 分類;",
 ch:["果物:3件,平均183.33円 / 野菜:2件,平均65円","果物:2件,平均225円 / 野菜:2件,平均65円","果物:3件,平均150円 / 野菜:2件,平均80円","果物:4件,平均183.33円 / 野菜:1件,平均65円"],
 ans:0,
 exp:"果物：りんご(150)+バナナ(100)+ぶどう(300)=3件、合計550÷3≒183.33円。野菜：にんじん(80)+たまねぎ(50)=2件、合計130÷2=65円。GROUP BYで集計。",
 choiceExps:["正しい。果物3件（150+100+300）÷3≒183.33円、野菜2件（80+50）÷2=65円。COUNT・AVGの計算が正確。","誤り。果物はりんご・バナナ・ぶどうの3件。2件は誤り。225円は150と300の平均で2件計算した場合の誤り。","誤り。果物の平均価格は(150+100+300)÷3≒183.33円。150円はりんごの価格であり平均ではない。","誤り。商品テーブルで果物は001(りんご)・002(バナナ)・004(ぶどう)の3件。4件は誤り。"]},

{id:1802, cat:"情報Ⅰ（データベース）",
 q:"関係データベースにおけるJOIN（結合）に関する記述として正しいものはどれか。",
 ch:["INNER JOINは両方のテーブルに存在するすべての行を返す（積集合）","LEFT JOINは左テーブルのすべての行と、条件に一致する右テーブルの行を結合する","OUTER JOINは2つのテーブルの共通する列の値が一致する行のみを返す","JOINはSELECT文では使用できず、別途専用の命令が必要である"],
 ans:1,
 exp:"LEFT JOIN（左外部結合）：左テーブルの全行を返し、右テーブルは条件一致する行のみ結合（不一致はNULL）。INNER JOIN：両テーブル条件一致行のみ。FULL OUTER JOIN：両テーブル全行。",
 choiceExps:["誤り。両方のテーブルすべての行を返すのはFULL OUTER JOIN。INNER JOINは両テーブルで条件に一致する行のみを返す（積集合に近い）。","正しい。LEFT JOINの説明。左テーブルのすべての行を返し、右テーブルは結合条件に一致する行のみ結合（不一致の場合はNULL）。","誤り。2つのテーブルの共通列の値が一致する行のみを返すのはINNER JOIN。OUTER JOINは一致しない行もNULLで返す。","誤り。JOINはSELECT文の中でFROM句と組み合わせて使用する標準的なSQL構文。専用の別命令は不要。"]},

{id:1803, cat:"情報Ⅰ（データベース）",
 q:"トランザクションのACID特性に関する記述として正しいものはどれか。",
 ch:["原子性（Atomicity）とは、トランザクションの処理が複数のユーザーから同時に実行できることを保証する性質である","一貫性（Consistency）とは、トランザクション完了後にデータベースが一貫した状態（整合性）を保つことを保証する性質である","独立性（Isolation）とは、トランザクション中の中間状態のデータが他のトランザクションからも参照可能であることを保証する性質である","耐久性（Durability）とは、コミットされたトランザクションの結果が障害発生時には取り消されることを保証する性質である"],
 ans:1,
 exp:"ACID特性：A（原子性）=全部実行か全部取消、C（一貫性）=整合状態を保つ、I（独立性）=他のトランザクションから中間状態が見えない、D（耐久性）=コミット後は障害でも消えない。",
 choiceExps:["誤り。複数ユーザーからの同時実行は「並行制御（Concurrency Control）」の話。原子性（Atomicity）はトランザクションが「全部実行される」か「全部取り消される」かのどちらかであることを保証する性質。","正しい。一貫性（Consistency）：トランザクション前後でデータベースの整合性制約が保たれることを保証する性質。","誤り。独立性（Isolation）は中間状態が他のトランザクションから「見えない」ことを保証する性質。「参照可能」は正反対の説明。","誤り。耐久性（Durability）はコミットされたトランザクションの結果が「障害が発生しても失われない（永続化される）」ことを保証する性質。「取り消される」は正反対。"]},

{id:1901, cat:"情報Ⅰ（アルゴリズム）",
 q:"次のPythonコードを実行したときの出力として正しいものはどれか。\n\ndef count_words(text):\n    words = text.split()\n    counts = {}\n    for w in words:\n        counts[w] = counts.get(w, 0) + 1\n    return counts\n\nresult = count_words(\"apple banana apple orange banana apple\")\nprint(result[\"apple\"], result[\"banana\"])",
 code:"def count_words(text):\n    words = text.split()\n    counts = {}\n    for w in words:\n        counts[w] = counts.get(w, 0) + 1\n    return counts\n\nresult = count_words(\"apple banana apple orange banana apple\")\nprint(result[\"apple\"], result[\"banana\"])",
 ch:["2 2","3 2","3 3","2 3"],
 ans:1,
 exp:"apple：3回（1,3,6番目）、banana：2回（2,5番目）、orange：1回。dict.get(key, 0)はkeyが存在しない場合に0を返す。result[\"apple\"]=3, result[\"banana\"]=2 → 出力「3 2」。",
 choiceExps:["誤り。appleは3回出現（「apple banana apple orange banana apple」）。2回ではない。","正しい。appleは3回、bananaは2回。dict.get(w,0)+1で各単語の出現回数をカウント。出力「3 2」。","誤り。bananaは「banana apple orange banana apple」で2回。bananaが3回という解釈は誤り。","誤り。appleは「apple banana apple orange banana apple」で3回。bananaは2回。2と3は逆になっている誤り。"]},

{id:1902, cat:"情報Ⅰ（アルゴリズム）",
 q:"Pythonのリスト内包表記として等価なコードはどれか。\n\n# 元のコード\nsquares = []\nfor x in range(1, 6):\n    if x % 2 == 1:\n        squares.append(x ** 2)",
 code:"# 元のコード\nsquares = []\nfor x in range(1, 6):\n    if x % 2 == 1:\n        squares.append(x ** 2)",
 ch:["squares = [x ** 2 for x in range(1, 6) if x % 2 == 0]","squares = [x ** 2 for x in range(1, 6) if x % 2 == 1]","squares = [x for x in range(1, 6) if x ** 2 % 2 == 1]","squares = [x ** 2 if x % 2 == 1 for x in range(1, 6)]"],
 ans:1,
 exp:"元のコード：range(1,6)=[1,2,3,4,5]で奇数（x%2==1）のx²を収集 → [1,9,25]。リスト内包表記は[式 for 変数 in イテラブル if 条件]の形式。ifの条件はx%2==1で一致。",
 choiceExps:["誤り。「if x % 2 == 0」は偶数のみを対象とする条件。元のコードは奇数（x%2==1）を対象としており条件が逆。","正しい。「[x**2 for x in range(1,6) if x%2==1]」は奇数のx²を収集するリスト内包表記。元のコードと等価で結果は[1,9,25]。","誤り。「if x**2 % 2 == 1」はx²が奇数のときという条件。x自体が奇数のときx²は常に奇数なので結果は同じだが、条件の記述方法として不自然。また構文として正確ではない可能性あり。","誤り。リスト内包表記の構文が誤り。正しい構文は「[式 for 変数 in イテラブル if 条件]」。ifとforの順序が逆では構文エラーになる。"]},

{id:2001, cat:"教育法規（その他）",
 q:"教育公務員特例法（教特法）に関する記述として正しいものはどれか。",
 ch:["教育公務員の政治的活動は地方公務員法ではなく教特法によって完全に禁止されている","公立学校の教員は、教育公務員特例法により、採用後5年以内に初任者研修を受けることが義務付けられている","公立学校の校長・教員等は、授業に支障のない限り、本属長の承認を受けて、勤務場所を離れて研修を行うことができる","教育公務員の兼職・兼業は教特法により一律に禁止されている"],
 ans:2,
 exp:"教特法第22条：教員は授業に支障のない限り本属長の承認を受けて勤務場所を離れた研修が可能。初任者研修は採用から1年間（第23条）。10年経験者研修（中堅等資質向上研修）も規定。",
 choiceExps:["誤り。教育公務員の政治的行為の制限は地方公務員法第36条と公選法等による。「完全禁止」ではなく、条例で定める範囲での制限。","誤り。初任者研修は採用後「1年間」（教特法第23条）。5年以内ではない。","正しい。教特法第22条第2項の規定。授業に支障のない限り本属長の承認で勤務場所外での研修が可能。","誤り。教育公務員も地方公務員法の規定に基づき、任命権者の許可等を受けて兼職・兼業が可能な場合がある。「一律禁止」は誤り。"]},

{id:2002, cat:"教育法規（その他）",
 q:"学校保健安全法に関する記述として正しいものはどれか。",
 ch:["学校保健安全法は高等学校には適用されず、小・中学校のみを対象とする","校長は、感染症にかかっており、かかっている疑いがあり、またはかかるおそれのある児童生徒等の出席を停止させることができる","学校における健康診断は任意実施であり、義務は規定されていない","学校安全計画の策定は努力義務であり、法的な義務ではない"],
 ans:1,
 exp:"学校保健安全法第19条：校長は感染症にかかっている（疑い・おそれ含む）児童生徒等の出席を停止させることができる。学校の臨時休業（第20条）を行う権限は学校の設置者にある。健康診断は毎年定期実施の義務あり（第13条）。学校安全計画の策定も義務（第27条）。",
 choiceExps:["誤り。学校保健安全法は幼稚園から大学まで学校教育法第1条に定める学校すべてに適用される。","正しい。第19条（出席停止）の規定。出席停止を命じる主体は「校長」。なお学校の臨時休業（第20条）は「学校の設置者」が行う。","誤り。定期健康診断は毎年実施が義務付けられている（第13条）。任意ではない。","誤り。学校安全計画の策定は第27条で義務（「しなければならない」）とされている。努力義務ではない。"]},

// ---- 西洋教育史 追加問題 ----
{id:2201, cat:"西洋教育史",
 q:"ペスタロッチの教育実践・思想に関する記述として正しいものはどれか。",
 ch:["「一般教育学」を著し、教授の4段階（明瞭・連合・系統・方法）を体系化した","スイスのイヴェルドンに学校を設立し、感覚的直観を重視した「直観教授」を実践した","「エミール」を著し、子どもの自然な発達を尊重する「消極教育」を主張した","イタリアのローマで知的障害児への教育を実践し、感覚教育・子どもの自発的活動を体系化した"],
 ans:1,
 exp:"ペスタロッチ（1746-1827）はスイスの教育者。貧困家庭の子どもへの実践教育で知られ、イヴェルドン学院での「直観教授（感覚を通じた学習）」が有名。ア=ヘルバルト、ウ=ルソー、エ=モンテッソーリの特徴。",
 choiceExps:["誤り。「一般教育学」・4段階教授法はヘルバルトの特徴。ペスタロッチは感覚的直観を重視した実践家。","正しい。ペスタロッチはイヴェルドン学院で「直観教授」を実践。「生活が陶冶する」を信条とした実践的教育者。","誤り。「エミール」・「消極教育」はルソーの特徴。ペスタロッチはルソーの影響を受けたが独自の実践を展開した。","誤り。ローマでの知的障害児教育・感覚教育はモンテッソーリの特徴。ペスタロッチはスイスで活動した。"]},

{id:2202, cat:"西洋教育史",
 q:"次のア～エの教育思想家を生きた時代の古い順に並べたとき、正しいものはどれか。\nア　コメニウス\nイ　ルソー\nウ　デューイ\nエ　ヘルバルト",
 ch:["ア→イ→エ→ウ","ア→エ→イ→ウ","イ→ア→エ→ウ","イ→エ→ア→ウ"],
 ans:0,
 exp:"コメニウス（1592-1670）→ルソー（1712-1778）→ヘルバルト（1776-1841）→デューイ（1859-1952）の順。",
 choiceExps:["正しい。コメニウス（17世紀）→ルソー（18世紀前）→ヘルバルト（18〜19世紀）→デューイ（19〜20世紀）の順。","誤り。ヘルバルト（1776〜）はルソー（1712〜）より後に生まれた。エ→イの順は誤り。","誤り。コメニウス（1592〜）はルソー（1712〜）より100年以上前の人物。イ→アの順は誤り。","誤り。コメニウス・ルソー・ヘルバルトの順番が誤り。"]},

{id:2203, cat:"西洋教育史",
 q:"モンテッソーリ教育に関する記述として適切なものはどれか。",
 ch:["「なすことによって学ぶ」を基本として、グループによる問題解決学習を中心に据えた","「恩物（Gabe）」と呼ばれる球・立方体などの教育玩具を用いた幼児教育を体系化した","子どもの自発的活動（自己教育力）を重視し、教師は「環境の準備者」として間接的に支援する役割を担う","教授の4段階理論を提唱し、知識の系統的な伝達を重視した一斉授業を推進した"],
 ans:2,
 exp:"モンテッソーリ（1870-1952）はイタリアの医師・教育者。子どもの自己教育力を信頼し、整えられた環境の中で子どもが自発的に活動できるよう教師が「環境の準備者」となることを重視。ア=デューイ、イ=フレーベル、エ=ヘルバルトの特徴。",
 choiceExps:["誤り。「なすことによって学ぶ」・問題解決学習はデューイの特徴。モンテッソーリは自発的・個別的な活動を重視した。","誤り。「恩物（Gabe）」を考案したのはフレーベル（幼稚園創設者）。モンテッソーリは独自の「感覚教具」を用いた。","正しい。モンテッソーリは子どもの自己教育力を重視し、教師は直接教えるのではなく環境を整える「環境の準備者」の役割を担う。","誤り。4段階教授法・系統的知識伝達の一斉授業はヘルバルトの特徴。モンテッソーリは個別的・自発的学習を重視した。"]},

{id:2204, cat:"西洋教育史",
 q:"次の教育思想家とその代表的著作の組合せとして正しいものはどれか。",
 ch:["コメニウス―「エミール」","ルソー―「民主主義と教育」","ヘルバルト―「一般教育学」","デューイ―「人間の教育」"],
 ans:2,
 exp:"ヘルバルト→「一般教育学」が正しい組合せ。コメニウス→「大教授学」、ルソー→「エミール」、デューイ→「民主主義と教育」「経験と教育」、フレーベル→「人間の教育」が正しい対応。",
 choiceExps:["誤り。「エミール」を著したのはルソー。コメニウスの代表作は「大教授学（Didactica Magna）」。","誤り。「民主主義と教育」を著したのはデューイ。ルソーの代表作は「エミール」。","正しい。ヘルバルトの代表作は「一般教育学」。道徳的品性の陶冶を目的とし4段階教授法を示した。","誤り。「人間の教育」を著したのはフレーベル（幼稚園創設者）。デューイは「民主主義と教育」「経験と教育」を著した。"]},

{id:2205, cat:"日本教育史",
 q:"大正自由教育運動（大正新教育運動）に関する記述として正しいものはどれか。",
 ch:["大正時代に文部省が主導し、全国一律に新しい教育課程を実施した公教育改革運動である","デューイの影響を受けた実践家らが中心となり、子どもの個性・自発性を重視した教育実践が各地で展開された","教育勅語の精神に基づく修身教育を強化し、儒教的道徳の徹底を目指した運動である","昭和初期に軍国主義教育への反動として起こった市民による教育改革運動である"],
 ans:1,
 exp:"大正自由教育運動：大正期（1910〜20年代）に澤柳政太郎（成城学園）・羽仁もと子（自由学園）・小原國芳（玉川学園）らが展開。デューイ等の欧米進歩主義教育の影響を受け、子どもの個性・自発性・創造性を重視した。",
 choiceExps:["誤り。大正自由教育運動は文部省主導の官製改革ではなく、民間の教育者・実践家たちによる草の根の教育運動。","正しい。デューイら進歩主義教育の影響のもと、澤柳政太郎・羽仁もと子・小原國芳らが各地で子どもの個性・自発性を重視した教育を実践した。","誤り。大正自由教育運動は修身教育の強化や儒教道徳の徹底ではなく、個性重視・自由・創造性を基調とした教育の推進を目指した。","誤り。大正自由教育運動は大正時代（1910〜20年代）に展開。昭和初期の軍国主義教育の台頭によって衰退した。"]},

{id:2206, cat:"日本教育史",
 q:"第二次世界大戦後の教育改革（昭和22〜23年頃）に関する記述として誤っているものはどれか。",
 ch:["教育基本法・学校教育法が昭和22年に制定され、6・3・3・4制の新学制が発足した","米国教育使節団の勧告を受け、民主的な教育の方向性が示された","教育委員会制度が導入され、当初は住民による公選制が採用された","修身・国史・地理の3教科は廃止されず、軍国主義的内容を排除した形で継続された"],
 ans:3,
 exp:"戦後教育改革では修身・国史・地理の授業は昭和20〜21年に停止・廃止された。修身→道徳教育（昭和33年から「道徳の時間」）、国史・地理→社会科に再編。残りは正しい記述。",
 choiceExps:["正しい記述。6・3・3・4制は昭和22年の学校教育法で規定。誤りを選ぶ問題なので不正解。","正しい記述。昭和21年に来日した第一次米国教育使節団の報告書が戦後教育改革の方向性に大きく影響した。誤りを選ぶ問題なので不正解。","正しい記述。教育委員会は昭和23年に公選制で発足（昭和31年から任命制に移行）。誤りを選ぶ問題なので不正解。","これが誤り（正解）。修身・国史・地理は継続されず廃止・停止された。修身→道徳教育、国史・地理→社会科として再編された。"]},

{id:2207, cat:"日本教育史",
 q:"臨時教育審議会（臨教審）に関する記述として正しいものはどれか。",
 ch:["昭和22年（1947年）に文部省内に設置され、教育基本法の制定を主導した審議会である","昭和59年（1984年）に内閣総理大臣の諮問機関として設置され「個性重視の原則」「教育の自由化」などを提言した","平成13年（2001年）に設置され「ゆとり教育」の本格化を柱とした教育改革を推進した","令和元年（2019年）に設置されGIGAスクール構想の法的枠組みを整備した"],
 ans:1,
 exp:"臨時教育審議会（臨教審）：中曽根内閣が昭和59年（1984年）に設置。「教育の個性化・自由化」「生涯学習体系への移行」「国際化・情報化への対応」を柱とした。平成期の教育改革の方向性を示した。",
 choiceExps:["誤り。教育基本法制定（昭和22年）を主導したのは別の審議機関。臨教審は昭和59年（1984年）設置。","正しい。昭和59年に中曽根首相の諮問機関として設置。「個性重視の原則」等を提言し平成の教育改革の基礎を作った。","誤り。平成13年（2001年）は遠山文部科学大臣の時代。「ゆとり教育」は学習指導要領改訂で実施されたもので臨教審とは時期が異なる。","誤り。GIGAスクール構想は令和元年（2019年）度補正予算で推進。臨教審は昭和59年設置で全く別の審議会。"]},

{id:2208, cat:"日本教育史",
 q:"次のア～エの法令・出来事を時代の古い順に並べたとき、正しいものはどれか。\nア　学制の公布\nイ　小学校令（森有礼文相時代）の公布\nウ　教育勅語の発布\nエ　学校教育法の制定",
