{id:4012, cat:"令和6年度過去問（高校学習指導要領総則）",
 q:"【令和6年度 問8】次の文章は，「高等学校学習指導要領」（平成30年文部科学省告示第68号）の「第4章 総合的な探究の時間 第2 各学校において定める目標及び内容 3 各学校において定める目標及び内容の取扱い」の一部である。文章中の空欄（①）〜（④）に当てはまる語句の組合せとして最も適切なものを選びなさい。\n\n⑸ 目標を実現するにふさわしい探究課題については，（①）の実態，生徒の特性等に応じて，例えば，国際理解，情報，環境，福祉・健康などの（②）な諸課題に対応する横断的・総合的な課題，（①）の特色に応じた課題，生徒の興味・関心に基づく課題，職業や自己の進路に関する課題などを踏まえて設定すること。\n⑹ 探究課題の解決を通して育成を目指す具体的な資質・能力については，次の事項に配慮すること。\nア　知識及び技能については，他教科等及び総合的な探究の時間で習得する知識及び技能が相互に関連付けられ，社会の中で（③）ものとして形成されるようにすること。\nイ　思考力，判断力，表現力等については，課題の設定，情報の収集，整理・分析，まとめ・表現などの探究の過程において発揮され，（④）において活用できるものとして身に付けられるようにすること。",
 ch:["①地域や学校　②グローバル　③評価される　④未知の状況","①社会構造　②現代的　③評価される　④自身のキャリア","①地域や学校　②現代的　③生きて働く　④未知の状況","①社会構造　②グローバル　③生きて働く　④自身のキャリア"],
 ans:2,
 exp:"①「地域や学校」②「現代的」③「生きて働く」④「未知の状況」が正しい組み合わせ（ウ）。学習指導要領原文：⑸の「地域や学校」・「現代的な諸課題」、⑹アの「社会の中で生きて働くものとして形成」、⑹イの「未知の状況において活用できるものとして身に付け」が根拠。",
 choiceExps:["誤り。②「グローバル」は誤り。学習指導要領の原文は「現代的な諸課題」。③「評価される」も誤りで、原文は「生きて働く」。","誤り。①「社会構造」は誤り。原文は「地域や学校」。③「評価される」も誤り。","正しい。①地域や学校②現代的③生きて働く④未知の状況が学習指導要領原文の正確な文言。","誤り。①「社会構造」・②「グローバル」・④「自身のキャリア」いずれも原文にない誤った語句。"]},

{id:4013, cat:"令和6年度過去問（高校学習指導要領総則）",
 q:"【令和6年度 問9】「高等学校学習指導要領」（平成30年文部科学省告示第68号）の「第1章 総則 第1款 高等学校教育の基本と教育課程の役割」の次の文の空欄（①）〜（④）に当てはまる語句の組み合わせとして正しいものはどれか。\n「道徳教育は，教育基本法及び学校教育法に定められた教育の（①）に基づき，生徒が自己探求と（②）に努め国家・社会の一員としての自覚に基づき行為しうる発達の段階にあることを考慮し，（③）を考え，主体的な判断の下に行動し，自立した人間として他者と共によりよく生きるための基盤となる（④）を養うことを目標とすること。」",
 ch:["①根本精神　②自己実現　③人間としての在り方生き方　④道徳性","①基本理念　②個性の伸長　③将来の生き方や進路　④道徳性","①根本精神　②個性の伸長　③人間としての在り方生き方　④実践意欲と態度","①基本理念　②自己実現　③将来の生き方や進路　④実践意欲と態度"],
 ans:0,
 exp:"高等学校学習指導要領（平成30年告示）総則の道徳教育の目標規定。①「根本精神」②「自己実現」③「人間としての在り方生き方」④「道徳性」が正しい文言の組み合わせ。高等学校では道徳の時間は設置されず、学校教育活動全体を通じた道徳教育の要としてホームルーム活動が位置付けられている。",
 choiceExps:["正しい。①根本精神②自己実現③人間としての在り方生き方④道徳性が学習指導要領の正確な文言。","誤り。①「基本理念」「個性の伸長」は誤り。「根本精神」「自己実現」が正しい。","誤り。②「個性の伸長」は誤り。「自己実現」が正しい。","誤り。①②③④すべての組み合わせが誤り。"]},

{id:4014, cat:"令和6年度過去問（高校学習指導要領特別活動）",
 q:"【令和6年度 問10】次の文章は，「高等学校学習指導要領」（平成30年文部科学省告示第68号）の「第5章 特別活動 第2 各活動・学校行事の目標及び内容 〔ホームルーム活動〕 2 内容」の一部である。文章中の空欄（①）〜（④）に当てはまる語句の組合せとして最も適切なものを，下のア〜エの中から一つ選んで記号で答えなさい。\n「⑴ ホームルームや学校における（①）への参画\nア　ホームルームや学校における生活上の諸問題の解決\n　ホームルームや学校における生活を向上・充実させるための課題を見いだし，解決するために話し合い，（②）を図り，実践すること。\nイ　ホームルーム内の組織づくりや役割の自覚\n　ホームルーム生活の充実や向上のため，生徒が（③）組織をつくり，役割を自覚しながら仕事を分担して，協力し合い実践すること。\nウ　学校における多様な（④）の生活の向上\n　生徒会などホームルームの枠を超えた多様な（④）における活動や学校行事を通して学校生活の向上を図るため，ホームルームとしての提案や取組を話し合って決めること。」",
 ch:["①集団づくり　②合意形成　③階層型　④集団","①集団づくり　②意思決定　③主体的に　④個人","①生活づくり　②意思決定　③階層型　④個人","①生活づくり　②合意形成　③主体的に　④集団"],
 ans:3,
 exp:"高等学校学習指導要領「特別活動」ホームルーム活動の内容⑴：①「生活づくり」②「合意形成」③「主体的に」④「集団」が正しい組み合わせ（エ）。ホームルームや学校における「生活づくり」への参画が⑴の大項目。",
 choiceExps:["誤り。①「集団づくり」③「階層型」は誤り。正しくは①「生活づくり」③「主体的に」。","誤り。①「集団づくり」②「意思決定」④「個人」は誤り。","誤り。②「意思決定」③「階層型」④「個人」は誤り。","正しい。①生活づくり②合意形成③主体的に④集団が正確な組み合わせ。"]},

{id:4015, cat:"令和6年度過去問（生徒指導）",
 q:"【令和6年度 問11】次の文章は，『生徒指導提要』（令和4年12月文部科学省）からの抜粋である。文章中の空欄①，②に当てはまる語句の組合せとして最も適切なものを選んで記号で答えなさい。\n「生徒指導は，児童生徒一人一人の個性の発見とよさや可能性の伸長と社会的資質・能力の発達を支えると同時に，自己の幸福追求と社会に受け入れられる（①）を支えることを目的とする。（中略）また，生徒指導の目的を達成するためには，児童生徒一人一人が（②）を身に付けることが重要です。すなわち，「（②）」を獲得することが目指されます。」",
 ch:["①他者理解　②規範意識","①他者理解　②自己指導能力","①自己実現　②規範意識","①自己実現　②自己指導能力"],

 choiceExps:["誤り。①「他者理解」②「規範意識」は誤り。","誤り。①「他者理解」は誤り。②「自己指導能力」は正しい。","誤り。①「自己実現」は正しいが②「規範意識」は誤り。","正しい。①自己実現②自己指導能力が正確な組み合わせ。"]},

{id:4016, cat:"令和6年度過去問（教育心理）",
 q:"【令和6年度 問12】学習障害（LD）に関する説明として適切でないものを，次のア～エの中から一つ選んで記号で答えなさい。",
 ch:["全体的に見れば標準的な知的能力をもつが，聞く，話す，読む，書く，計算するなどの学習の基礎的能力のうち一部の能力に偏って著しく苦手な領域をもつ。","中枢神経系の機能障害があることが原因と推定されるが，視覚障害・聴覚障害・知的障害・情緒障害などの障害や環境的な要因が直接の原因によるものではない。","通常の学級での指導は困難であるため，通級による指導を必須とする。","学習障害（LD）により自己評価の低下が見られる場合には，自己理解や自己有能感を高めることが大切である。"],
 ans:2,
 exp:"「通常の学級での指導は困難であるため，通級による指導を必須とする」が誤り。LDのある生徒も通常の学級で適切な支援を受けながら学ぶことができ、通級による指導は必須ではなく、必要に応じた選択肢の一つ。",
 choiceExps:["適切な説明。LDの定義として標準的な知的能力を持ちながら特定領域に著しい困難を示す点について正しい説明。","適切な説明。LDは中枢神経系の機能障害が原因と推定され、他の障害や環境要因が直接の原因ではないことを正しく説明している。","適切でない。LDのある生徒は通常の学級でも適切な支援で学べる。通級による指導は必須ではなく選択肢の一つ。","適切な説明。自己評価の低下に対し自己理解や自己有能感を高めることは重要な支援。"]},

{id:4017, cat:"令和6年度過去問（教育時事）",
 q:"【令和6年度 問15】次の各文は，「「令和の日本型学校教育」の構築を目指して」（令和3年1月26日中央教育審議会）の一部である。文中の下線部の内容に誤りのあるものを，次のア～エの中から一つ選んで記号で答えなさい。",
 ch:["高等学校は，義務教育機関ではないものの，既に進学率が約【99％】に達し，今日では中学校を卒業したほぼ全ての生徒が進学する教育機関となっている。","高等学校には多様な入学動機や進路希望，学習経験，言語環境など，様々な背景を持つ生徒が在籍していることから，義務教育において育成された資質・能力を更に発展させながら，生徒の多様な能力・適性，興味・関心等に応じた学びを実現することが必要である。","高校生の現状の一つとして，学校生活への満足度や学習意欲が中学校段階に比べて【上昇】しており，高等学校における教育活動を，高校生を中心に据えることを改めて確認し，その学習意欲をさらに喚起し，可能性及び能力を最大限に伸長することが求められる。","高等学校は初等中等教育段階最後の教育機関として，高等教育機関や実社会との接続機能を果たすことが求められており，また，選挙権年齢や成年年齢が18歳に引き下げられることなどを踏まえ，生徒が高等学校在学中に主権者の一人としての自覚を深めていくための学びが求められている。"],
 ans:2,
 exp:"ウの「上昇」が誤り。実際の答申では「高校生の学習意欲や学校生活への満足度が中学校段階に比べて低下している」ことが課題として指摘されている。",
 choiceExps:["下線部（99％）は正しい。高等学校進学率は約99％に達している。","下線部の内容は正しい。高等学校の多様な生徒に応じた学びの実現についての適切な説明。","下線部（上昇）が誤り。答申では中学校段階と比べて学習意欲・満足度が「低下」していることが課題として指摘されている。","下線部の内容は正しい。高等学校の接続機能と主権者教育についての適切な説明。"]},

{id:4018, cat:"令和6年度過去問（情報Ⅰ）",
 q:"【令和6年度 問16】次の文章は，『高等学校学習指導要領（平成30年告示）解説 情報編』の「第1節 情報Ⅰ 2 内容とその取扱い ⑵ コミュニケーションと情報デザイン」に示された内容に基づく記述である。文章中の空欄①～⑤に当てはまる語句の組合せとして最も適切なものを選んで記号で答えなさい。\n「ここでは，メディアと（①）手段及び情報デザインに着目し，（②）に応じて受け手に分かりやすく情報を伝える活動を通じて，メディアの特性や（①）手段の特徴について，その変遷も踏まえて科学的に理解するようにし，効果的な（①）を行うための情報デザインの考え方や方法を身に付けるとともに，コンテンツを表現し，評価し改善する力を養うことができるよう指導する。なお，ここで扱う情報デザインとは，効果的な（①）や問題解決のために，情報を（③）したり，（④）を持った情報を受け手に対して分かりやすく伝達したり，操作性を高めたりするためのデザインの基礎知識や表現方法及びその（⑤）のことである。」",
 ch:["①コミュニケーション　②目的や状況　③整理　④目的や意図　⑤技術","①記号化　②目的や状況　③加工　④目標や価値　⑤技能","①コミュニケーション　②用途や年齢　③整理　④目標や価値　⑤技能","①記号化　②用途や年齢　③加工　④目的や意図　⑤技術"],
 ans:0,
 exp:"「コミュニケーション」「目的や状況」「整理」「目的や意図」「技術」が正確な文言の組み合わせ（ア）。情報デザインはコミュニケーションの目的や状況に応じて情報を整理・伝達するための技術。",
 choiceExps:["正しい。①コミュニケーション②目的や状況③整理④目的や意図⑤技術の組み合わせが正確。","誤り。①「記号化」②「目的や状況」は①が誤り。⑤「技能」も誤り。","誤り。②「用途や年齢」④「目標や価値」⑤「技能」は誤り。","誤り。①「記号化」②「用途や年齢」③「加工」は誤り。"]},

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getQ(id) { return QUESTIONS.find(q => q.id === id); }

function buildExamQuestionIds() {
  // 本番形式: 合計20問、分野ごとに抽出
  // 優先度: ①前回不正解 → ②未出題 → ③正解済み
  const EXAM_CATS = [
    {cats:["西洋教育史","日本教育史","令和6年度過去問（西洋教育史）","令和6年度過去問（日本教育史）","令和7年度過去問（日本教育史）","令和7年度過去問（西洋教育史）"], total:2},
    {cats:["教育基本法","令和6年度過去問（教育基本法）","令和7年度過去問（教育基本法）"], total:1},
    {cats:["学校教育法","令和6年度過去問（学校教育法）","令和7年度過去問（学校教育法）"], total:1},
    {cats:["地方公務員法","令和6年度過去問（地方公務員法・教特法）","令和7年度過去問（教育公務員特例法）"], total:1},
    {cats:["高校学習指導要領（総則）","令和6年度過去問（高校学習指導要領総則）","令和7年度過去問（高校学習指導要領総則）"], total:5},
    {cats:["生徒指導","令和6年度過去問（生徒指導）","令和7年度過去問（生徒指導）"], total:1},
    {cats:["教育心理（人格と適応）","教育心理（発達の理論）","教育心理（学習の理論）","令和6年度過去問（教育心理）","令和7年度過去問（教育心理）"], total:3},
    {cats:["教育時事","令和6年度過去問（教育時事）","令和7年度過去問（教育時事）"], total:1},
    {cats:["学習指導要領（情報編）","令和7年度過去問（学習指導要領・情報編）","令和6年度過去問（学習指導要領・情報編）","令和7年度過去問（学習指導要領・情報編）"], total:3},
    {cats:["情報Ⅰ（コンピュータ・2進数）","情報Ⅰ（論理回路）","情報Ⅰ（アルゴリズム）","情報Ⅰ（ネットワーク）","情報Ⅰ（情報セキュリティ）","情報Ⅰ（データベース）","令和6年度過去問（情報Ⅰ）","令和7年度過去問（情報Ⅰ）"], total:2},
  ];
  const history = loadHistory();
  const ids = [];
  for (const group of EXAM_CATS) {
    const pool = QUESTIONS.filter(q => group.cats.includes(q.cat));
    // 優先度でグループ分け
    const wrong   = shuffle(pool.filter(q => history[q.id] === "wrong"));
    const unseen  = shuffle(pool.filter(q => !history[q.id]));
    const correct = shuffle(pool.filter(q => history[q.id] === "correct"));
    // 優先度順に結合してから必要数だけ取得（未出題 → 不正解 → 正解済み）
    const prioritized = [...unseen, ...wrong, ...correct];
    const picked = prioritized.slice(0, group.total);
    ids.push(...picked.map(q => q.id));
  }
  return ids;
}

function allCategories() {

  return cats;

    const total = save.questionIds.length;
    const done = save.currentIdx;
    const modeLabel = save.mode === "exam" ? "本番形式模擬試験" : save.mode === "all" ? "全問題練習" : save.mode === "r6" ? "令和6年度過去問" : save.mode === "r7" ? "令和7年度過去問" : `分野別（${save.catFilter}）`;
    resumeBanner = `
    <div class="save-banner">
      <div class="save-banner-icon">📌</div>
      <div class="save-banner-text">
        <strong>中断した練習があります</strong><br>
        ${modeLabel} ／ ${done}問目まで回答済み（全${total}問）
      </div>
      <button class="btn btn-last btn-sm" onclick="resumeSession()">続きから再開</button>
    </div>`;
  }

  const history = loadHistory();
  const wrongCount = Object.values(history).filter(v => v === "wrong").length;
  const wrongBadge = wrongCount > 0
    ? `<span style="display:inline-block;background:#e74c3c;color:#fff;font-size:0.75rem;font-weight:bold;border-radius:999px;padding:2px 9px;margin-left:8px;vertical-align:middle">要復習 ${wrongCount}問</span>`
    : "";

  app.innerHTML = header() + `
  <div class="card">
    <div class="home-title">練習モードを選択してください</div>
    <div class="home-desc">令和6・7年度の出題傾向をもとにした予想問題です</div>
    ${resumeBanner}
    <div class="divider"></div>
    <button class="btn btn-primary" onclick="startExam()">
      📝 本番形式模擬試験（20問）${wrongBadge}
    </button>
    <button class="btn btn-secondary" onclick="startAll()">
      📚 全問題練習（${QUESTIONS.length}問）
    </button>
    <div class="home-desc" style="margin-top:16px;font-weight:bold">過去問チャレンジ</div>
    <button class="btn btn-outline" onclick="startPastExam(6)">
      📄 令和6年度 過去問（全20問）
    </button>
    <button class="btn btn-outline" onclick="startPastExam(7)">
      📄 令和7年度 過去問（全20問）
    </button>
    <div class="home-desc" style="margin-top:8px">分野を選んで練習</div>
    <div class="cat-grid">
      ${allCategories().map(cat => {
        const qs = catQuestions(cat);
        const n = qs.length;
        const answered = qs.filter(q => history[q.id]);
        const correct = qs.filter(q => history[q.id] === "correct").length;
        const total = answered.length;
        let accHtml = "";
        let cls = "";
        if (total > 0) {
          const pct = Math.round(correct / total * 100);
          if (pct < 50) { cls = "acc-low"; accHtml = `<div class="cat-acc" style="color:#e74c3c">正答率 ${pct}%（要復習）</div>`; }
          else if (pct < 75) { cls = "acc-mid"; accHtml = `<div class="cat-acc" style="color:#e67e22">正答率 ${pct}%</div>`; }
          else { accHtml = `<div class="cat-acc" style="color:#27ae60">正答率 ${pct}%</div>`; }
        }
        return `<button class="cat-btn ${cls}" onclick="startCat('${escHtml(cat)}')">
          <div class="cat-name">${escHtml(cat)}</div>
          <div class="cat-count">${n}問${total > 0 ? `（回答済 ${total}問）` : ""}</div>
          ${accHtml}
        </button>`;
      }).join("")}
    </div>
  </div>
  <div class="card" style="margin-top:8px">
    <div class="home-title" style="font-size:0.95rem;padding:16px 24px 4px">📲 端末間で進捗を引き継ぐ</div>
    <div class="home-desc" style="padding:0 24px 12px">スマホ↔パソコン間で学習履歴を移動できます</div>
    <div style="padding:0 24px 16px;display:flex;flex-direction:column;gap:10px">
      <button class="btn btn-outline" style="margin:0" onclick="exportProgress()">
        📤 この端末の進捗をコピー（エクスポート）
      </button>
      <div style="font-size:0.82rem;color:var(--muted);text-align:center">― または ―</div>
      <div style="display:flex;gap:8px;align-items:stretch">
        <input id="importInput" type="text" placeholder="他の端末でコピーしたコードを貼り付け"
          style="flex:1;padding:10px 12px;border:2px solid var(--border);border-radius:var(--radius);font-size:0.85rem;font-family:inherit;outline:none">
        <button class="btn btn-secondary btn-sm" style="white-space:nowrap" onclick="importProgress()">📥 取り込む</button>
      </div>
    </div>
  </div>
  <p style="text-align:center;font-size:0.75rem;color:#aaa;padding:8px">※本アプリの問題は公式問題ではなく予想問題です。正確な情報は公式資料をご確認ください。</p>
  `;
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function renderChoiceText(s) {
  return escHtml(s).replace(/【([^】]+)】/g,'<u>$1</u>');
}

function renderExam() {
  const ids = APP.questionIds;
  const idx = APP.currentIdx;
  const total = ids.length;

  if (idx >= total) { showResult(); return; }

  const q = getQ(ids[idx]);
  if (!q) { APP.currentIdx++; render(); return; }

  const answered = APP.answers[q.id] !== undefined;
  const chosen = APP.answers[q.id]; // 元の選択肢インデックス
  const isCorrect = q.type === "essay" ? chosen === 0 : chosen === q.ans;
  const pct = Math.round((idx / total) * 100);

  const labels = ["ア","イ","ウ","エ","オ"];
  const modeLabel = APP.mode === "exam" ? "模擬試験" : APP.mode === "all" ? "全問題" : APP.mode === "r6" ? "令和6年度過去問" : APP.mode === "r7" ? "令和7年度過去問" : APP.catFilter;

  // Question text: handle newlines
  let qText = q.q;
  if (qText.includes("\n")) {
    const lines = qText.split("\n");
    const mainQ = lines[0];
    const rest = lines.slice(1).join("<br>");
    qText = mainQ + (rest ? `<br><span style="font-weight:normal;font-size:0.88rem;margin-top:4px;display:block">${rest}</span>` : "");
  }

  let codeHtml = "";
  if (q.code) codeHtml = `<div class="q-code">${escHtml(q.code)}</div>`;

  const progressHtml = `
    <div class="progress-wrap">
      <div class="progress-label"><span>${modeLabel}</span><span>${idx + 1} / ${total}問</span></div>
      <div class="progress-bar-bg"><div class="progress-bar-fg" style="width:${pct}%"></div></div>
    </div>`;
  const metaHtml = `
    <div class="q-meta">
      <span class="q-num">問${idx + 1}</span>
      <span class="q-cat">${escHtml(q.cat)}</span>
    </div>`;
  const navNext = `<div class="nav-area">${idx + 1 < total
    ? `<button class="btn btn-primary btn-sm" onclick="nextQ()">次の問題 →</button>`
    : `<button class="btn btn-success btn-sm" onclick="showResult()">結果を見る</button>`}</div>`;

  // ---- 論述問題 ----
  if (q.type === "essay") {
    if (!APP.essayRevealed) APP.essayRevealed = {};
    const revealed = APP.essayRevealed[q.id] || answered;
    let essayBody = "";
    if (!revealed) {
      essayBody = `
        <div class="essay-hint">自分なりに答えを考えてから、模範解答を確認しましょう。</div>
        <button class="btn-reveal" onclick="revealEssay(${q.id})">模範解答を見る</button>`;
    } else if (!answered) {
      essayBody = `
        <div class="essay-model"><strong>【模範解答】</strong>${escHtml(q.modelAnswer)}</div>
        <div class="essay-assess">
          <button class="btn-assess-ok" onclick="answer(${q.id},0)">○ 理解できた</button>
          <button class="btn-assess-ng" onclick="answer(${q.id},1)">✕ もう一度</button>
        </div>`;
    } else {
      const okLabel = isCorrect
        ? `<div class="answered-label label-correct">✓ 理解できた！</div>`
        : `<div class="answered-label label-wrong">△ もう一度確認しましょう</div>`;
      essayBody = `
        <div class="essay-model"><strong>【模範解答】</strong>${escHtml(q.modelAnswer)}</div>
        ${okLabel}${navNext}`;
    }
    app.innerHTML = header() + `
    <div class="card">
      ${progressHtml}${metaHtml}
      <div class="q-text">${qText}</div>
      ${essayBody}
    </div>
  <div style="text-align:center;padding:8px">
    <button class="btn btn-outline btn-sm" onclick="confirmHome()">ホームに戻る（中断）</button>
  </div>`;
    return;
  }

  // ---- 選択問題 ----
  if (!APP.choiceOrders) APP.choiceOrders = {};
  if (!APP.choiceOrders[q.id]) {
    APP.choiceOrders[q.id] = shuffle(Array.from({length: q.ch.length}, (_, i) => i));
    save();
  }
  const order = APP.choiceOrders[q.id];

  if (!APP.eliminations) APP.eliminations = {};
  const elim = APP.eliminations[q.id] || {};
  const hasSelected = Object.values(elim).some(v => v === "selected");

  let choicesHtml = order.map((origIdx, displayIdx) => {
    const c = q.ch[origIdx];
    let cls = "choice-btn";
    let expHtml = "";
    if (answered) {
      cls += " disabled";
      if (origIdx === q.ans) cls += " show-correct";
      if (origIdx === chosen && chosen !== q.ans) cls += " wrong";
      if (q.choiceExps && q.choiceExps[origIdx]) {
        const isCo = origIdx === q.ans;
        expHtml = `<div class="choice-exp ${isCo ? 'choice-exp-o' : 'choice-exp-x'}">${isCo ? '○' : '×'} ${escHtml(q.choiceExps[origIdx])}</div>`;
      }
    } else {
      const st = elim[origIdx] || "normal";
      if (st === "selected") cls += " ch-selected";
      if (st === "eliminated") cls += " eliminated";
    }
    return `<button class="${cls}" ${answered ? "" : `onclick="toggleChoiceState(${q.id},${origIdx})"`}>
      <span class="choice-label">${labels[displayIdx]}</span>
      <div class="choice-text-wrap"><span>${renderChoiceText(c)}</span>${expHtml}</div>
    </button>`;
  }).join("");

  let feedbackHtml = "";
  if (answered) {
    const correctDisplayPos = order.indexOf(q.ans);
    const resultLabel = isCorrect
      ? `<div class="answered-label label-correct">✓ 正解！</div>`
      : `<div class="answered-label label-wrong">✗ 不正解 （正答：${labels[correctDisplayPos]}）</div>`;
    feedbackHtml = resultLabel + `
    <div class="explanation">
      <strong>解説：</strong><br>${escHtml(q.exp)}
    </div>`;
  }

  const navHtml = answered ? navNext : `
  <div class="submit-btn-wrap">
    <button class="btn-answer" ${hasSelected ? "" : "disabled"} onclick="submitAnswer(${q.id})">解答する</button>
    ${hasSelected ? "" : `<span style="font-size:0.82rem;color:var(--muted)">答えと思う選択肢をタップ → 解答する</span>`}
  </div>`;

  app.innerHTML = header() + `
  <div class="card">
    ${progressHtml}${metaHtml}
    <div class="q-text">${qText}</div>
    ${codeHtml}
    <div class="choices">${choicesHtml}</div>
    ${feedbackHtml}
    ${navHtml}
  </div>
  <div style="text-align:center;padding:8px">
    <button class="btn btn-outline btn-sm" onclick="confirmHome()">ホームに戻る（中断）</button>
  </div>`;
}

function renderResult() {
  const ids = APP.questionIds;
  let correct = 0, wrong = 0;
  const catStats = {};

  for (const id of ids) {
    const q = getQ(id);
    if (!q) continue;
    const c = q.cat;
    if (!catStats[c]) catStats[c] = {correct:0, wrong:0, total:0};
    catStats[c].total++;
    const isCorrectAnswer = q.type === "essay" ? APP.answers[id] === 0 : APP.answers[id] === q.ans;
    if (isCorrectAnswer) {
      correct++;
      catStats[c].correct++;
    } else {
      wrong++;
      catStats[c].wrong++;
    }
  }

  const total = ids.length;
  const pct = Math.round((correct / total) * 100);
  let rank, rankCls;
  if (pct >= 90) { rank = "S（優秀）"; rankCls = "rank-s"; }
  else if (pct >= 75) { rank = "A（合格圏）"; rankCls = "rank-a"; }
  else if (pct >= 60) { rank = "B（もう少し）"; rankCls = "rank-b"; }
  else if (pct >= 40) { rank = "C（要復習）"; rankCls = "rank-c"; }
  else { rank = "D（基礎から学習）"; rankCls = "rank-d"; }

  const catRows = Object.entries(catStats).map(([cat, s]) => `
    <tr>
      <td>${escHtml(cat)}</td>
      <td class="cell-correct">${s.correct}</td>
      <td class="cell-wrong">${s.wrong}</td>
      <td>${s.total}</td>
    </tr>`).join("");

  // Clear save
  deleteSave();

  app.innerHTML = header() + `
  <div class="card">
    <div class="result-header">
      <div style="font-size:1rem;color:#888;margin-bottom:8px">試験終了</div>
      <div class="result-score">${correct}<span> / ${total}</span></div>
      <div style="font-size:1rem;color:#555;margin:4px 0">${pct}%</div>
      <span class="result-rank ${rankCls}">${rank}</span>
    </div>
    <div class="card-body" style="padding-top:0">
      <table class="result-table">
        <thead><tr><th>分野</th><th>正解</th><th>不正解</th><th>出題数</th></tr></thead>
        <tbody>${catRows}</tbody>
      </table>
    </div>
  </div>
  <div style="text-align:center;padding:8px 0 16px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <button class="btn btn-primary btn-sm" onclick="startExam()">もう一度（模擬試験）</button>
    <button class="btn btn-outline btn-sm" onclick="backHome()">ホームへ</button>
  </div>`;
}

// =============================================
// 進捗エクスポート / インポート
// =============================================
function exportProgress() {
  const data = {
    save: localStorage.getItem(SAVE_KEY),
    history: localStorage.getItem(HISTORY_KEY)
  };
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
  // クリップボードにコピー
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(encoded).then(() => {
      showToast("✅ コードをクリップボードにコピーしました！\n他の端末で「取り込む」欄に貼り付けてください。");
    }).catch(() => {
      promptCopy(encoded);
    });
  } else {
    promptCopy(encoded);
  }
}

function promptCopy(encoded) {
  const ta = document.createElement("textarea");
  ta.value = encoded;
  ta.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:500px;height:80px;font-size:0.8rem;z-index:9999;border:2px solid #1a3a5c;border-radius:8px;padding:8px";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); showToast("✅ コードをコピーしました！"); }
  catch(e) { showToast("下のコードを手動でコピーしてください"); }
  setTimeout(() => { if (ta.parentNode) ta.parentNode.removeChild(ta); }, 4000);
}

function importProgress() {
  const input = document.getElementById("importInput");
  if (!input || !input.value.trim()) {
    showToast("⚠️ コードを貼り付けてください", "warn");
    return;
  }
  try {
    const decoded = JSON.parse(decodeURIComponent(escape(atob(input.value.trim()))));
    if (decoded.save !== null && decoded.save !== undefined) {
      localStorage.setItem(SAVE_KEY, decoded.save);
    }
    if (decoded.history !== null && decoded.history !== undefined) {
      localStorage.setItem(HISTORY_KEY, decoded.history);
    }
    showToast("✅ 進捗を取り込みました！画面を更新します...");
    setTimeout(() => { location.reload(); }, 1500);
  } catch(e) {
    showToast("❌ コードが正しくありません。もう一度コピーし直してください。", "error");
  }
}

let _toastTimer = null;
function showToast(msg, type) {
  let toast = document.getElementById("_toast");
  if (!toast) {
    toast = document.createElement("div");
    toast.id = "_toast";
    toast.style.cssText = "position:fixed;bottom:24px;left:50%;transform:translateX(-50%);max-width:90vw;padding:12px 20px;border-radius:10px;font-size:0.9rem;font-weight:bold;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);text-align:center;white-space:pre-line;transition:opacity 0.3s";
    document.body.appendChild(toast);
  }
  toast.style.background = type === "error" ? "#c0392b" : type === "warn" ? "#e67e22" : "#1e8449";
  toast.style.color = "#fff";
  toast.style.opacity = "1";
  toast.textContent = msg;
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { toast.style.opacity = "0"; }, 3500);
}

// =============================================
// イベントハンドラ
// =============================================
function startExam() {
  const ids = buildExamQuestionIds();
  APP = {
    screen: "exam",
    mode: "exam",
    catFilter: null,
    questionIds: ids,
    currentIdx: 0,
    answers: {},
    choiceOrders: {},
    startedAt: Date.now(),
  };
  save();
  render();
}

function startAll() {
  const ids = shuffle(QUESTIONS.map(q => q.id));
  APP = {
    screen: "exam",
    mode: "all",
    catFilter: null,
    questionIds: ids,
    currentIdx: 0,
    answers: {},
    choiceOrders: {},
    startedAt: Date.now(),
  };
  save();
  render();
}

function startPastExam(year) {
  const prefix = year === 6 ? "令和6年度過去問" : "令和7年度過去問";
  const qs = QUESTIONS.filter(q => q.cat.startsWith(prefix));
  // 問題文中の「問X」の番号で昇順ソート（実際の試験と同じ順番）
  const getQNum = q => {
    const m = q.q.match(/【令和\d年度\s*問(\d+)】/);
    return m ? parseInt(m[1]) : 999;
  };
  const ids = qs.sort((a, b) => getQNum(a) - getQNum(b)).map(q => q.id);
  APP = {
    screen: "exam",
    mode: year === 6 ? "r6" : "r7",
    catFilter: null,
    questionIds: ids,
    currentIdx: 0,
    answers: {},
    choiceOrders: {},
    startedAt: Date.now(),
  };
  save();
  render();
}

function startCat(cat) {
  const ids = shuffle(catQuestions(cat).map(q => q.id));
  APP = {
    screen: "exam",
    mode: "cat",
    catFilter: cat,
    questionIds: ids,
    currentIdx: 0,
    answers: {},
    choiceOrders: {},
    startedAt: Date.now(),
  };
  save();
  render();
}

function resumeSession() {
  const s = loadSave();
  if (!s) { backHome(); return; }
  APP = s;
  render();
}

function revealEssay(qId) {
  if (!APP.essayRevealed) APP.essayRevealed = {};
  APP.essayRevealed[qId] = true;
  save();
  render();
}

function toggleChoiceState(qId, origIdx) {
  if (!APP.eliminations) APP.eliminations = {};
  if (!APP.eliminations[qId]) APP.eliminations[qId] = {};
  const states = APP.eliminations[qId];
  const cur = states[origIdx] || "normal";
  if (cur === "normal") {
    // 他の「選択中」を解除して、この選択肢を選択
    for (const k in states) { if (states[k] === "selected") states[k] = "normal"; }
    states[origIdx] = "selected";
  } else if (cur === "selected") {
    states[origIdx] = "eliminated";
  } else {
    states[origIdx] = "normal";
  }
  save();
  render();
}

function submitAnswer(qId) {
  if (!APP.eliminations || !APP.eliminations[qId]) return;
  const states = APP.eliminations[qId];
  const sel = Object.keys(states).find(k => states[k] === "selected");
  if (sel === undefined) return;
  answer(qId, parseInt(sel));
}

function answer(qId, choiceIdx) {
  APP.answers[qId] = choiceIdx;
  save();
  render();
}

function nextQ() {
  APP.currentIdx++;
  save();
  render();
}

function showResult() {
  updateHistory(); // セッション結果を履歴に保存
  APP.screen = "result";
  render();
}

function confirmHome() {
  if (confirm("中断して戻りますか？進捗は保存されており、次回「続きから再開」できます。")) {
    backHome();
  }
}

function backHome() {
  APP.screen = "home";
  render();
}

function save() {
  writeSave(APP);
}

// =============================================
// 初期化
// =============================================
render();
</script>
</body>
</html>
